<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="44%" r="58%">
      <stop offset="0%"   stop-color="#091420"/>
      <stop offset="62%"  stop-color="#030c18"/>
      <stop offset="100%" stop-color="#000004"/>
    </radialGradient>
    <radialGradient id="planet" cx="32%" cy="25%" r="68%">
      <stop offset="0%"   stop-color="#d4e2ec"/>
      <stop offset="22%"  stop-color="#8aacc0"/>
      <stop offset="68%"  stop-color="#2e4860"/>
      <stop offset="100%" stop-color="#0a1828"/>
    </radialGradient>
    <radialGradient id="pGlowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#1a4060" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#001020" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hl" cx="28%" cy="20%" r="48%">
      <stop offset="0%"   stop-color="white" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="saber" x1="0" y1="0" x2="512" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#00c8f0" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#00c8f0" stop-opacity="0.92"/>
      <stop offset="50%"  stop-color="#a8f0ff" stop-opacity="1"/>
      <stop offset="80%"  stop-color="#00c8f0" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#00c8f0" stop-opacity="0"/>
    </linearGradient>
    <filter id="pGlowF" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <filter id="saberF" x="-5%" y="-800%" width="110%" height="1700%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dotF" x="-300%" y="-300%" width="700%" height="700%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <clipPath id="rc">
      <rect width="512" height="512" rx="110"/>
    </clipPath>
    <clipPath id="pc">
      <circle cx="256" cy="256" r="118"/>
    </clipPath>
  </defs>

  <rect width="512" height="512" rx="110" fill="#000008"/>
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <g clip-path="url(#rc)" fill="white">
    <circle cx="40"  cy="52"  r="1.2" opacity="0.85"/>
    <circle cx="115" cy="28"  r="0.8" opacity="0.65"/>
    <circle cx="194" cy="65"  r="1"   opacity="0.55"/>
    <circle cx="290" cy="20"  r="1.4" opacity="0.75"/>
    <circle cx="372" cy="46"  r="0.8" opacity="0.60"/>
    <circle cx="452" cy="70"  r="1.2" opacity="0.70"/>
    <circle cx="490" cy="145" r="0.8" opacity="0.50"/>
    <circle cx="28"  cy="162" r="1"   opacity="0.60"/>
    <circle cx="482" cy="236" r="1.1" opacity="0.65"/>
    <circle cx="20"  cy="302" r="0.8" opacity="0.50"/>
    <circle cx="494" cy="332" r="1"   opacity="0.60"/>
    <circle cx="65"  cy="405" r="1.2" opacity="0.65"/>
    <circle cx="434" cy="392" r="0.8" opacity="0.55"/>
    <circle cx="155" cy="472" r="1"   opacity="0.50"/>
    <circle cx="320" cy="490" r="1.2" opacity="0.60"/>
    <circle cx="406" cy="462" r="0.8" opacity="0.65"/>
    <circle cx="78"  cy="98"  r="1.8" opacity="0.90" fill="#c0eaff"/>
    <circle cx="443" cy="186" r="1.5" opacity="0.80" fill="#b8e4ff"/>
    <circle cx="98"  cy="356" r="1.5" opacity="0.75" fill="#c8eeff"/>
    <circle cx="462" cy="444" r="1.8" opacity="0.80" fill="#d8f0ff"/>
    <circle cx="238" cy="488" r="1.2" opacity="0.70" fill="#c0e8ff"/>
  </g>

  <circle cx="256" cy="256" r="148" fill="url(#pGlowGrad)" filter="url(#pGlowF)"/>
  <circle cx="256" cy="256" r="118" fill="url(#planet)"/>

  <g clip-path="url(#pc)" stroke="#6090b0" fill="none">
    <line x1="138" y1="256" x2="374" y2="256" stroke-opacity="0.55" stroke-width="2.5"/>
    <line x1="256" y1="138" x2="256" y2="374" stroke-opacity="0.18" stroke-width="1.5"/>
    <line x1="138" y1="218" x2="374" y2="218" stroke-opacity="0.13" stroke-width="1"/>
    <line x1="138" y1="294" x2="374" y2="294" stroke-opacity="0.11" stroke-width="1"/>
    <line x1="197" y1="138" x2="197" y2="374" stroke-opacity="0.09" stroke-width="1"/>
    <line x1="315" y1="138" x2="315" y2="374" stroke-opacity="0.09" stroke-width="1"/>
  </g>

  <g clip-path="url(#pc)">
    <circle cx="312" cy="202" r="38" fill="none" stroke="#80a8c4" stroke-opacity="0.55" stroke-width="2.5"/>
    <circle cx="312" cy="202" r="25" fill="#060e18" fill-opacity="0.90"/>
    <circle cx="312" cy="202" r="14" fill="#0a1e30"/>
    <circle cx="312" cy="202" r="9"  fill="#00c0f0" opacity="0.25" filter="url(#dotF)"/>
    <circle cx="312" cy="202" r="6"  fill="#00c8f8" opacity="0.88"/>
    <circle cx="312" cy="202" r="3"  fill="white"   opacity="0.96"/>
  </g>

  <rect x="0" y="249" width="512" height="14" fill="url(#saber)" clip-path="url(#rc)" filter="url(#saberF)" opacity="0.85"/>
  <rect x="0" y="253.5" width="512" height="5" fill="url(#saber)" clip-path="url(#rc)" opacity="0.90"/>

  <circle cx="256" cy="256" r="118" fill="url(#hl)"/>
</svg>
