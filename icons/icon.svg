<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- 背景グラデーション -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#1a0533"/>
      <stop offset="100%" stop-color="#0d1b4b"/>
    </linearGradient>
    <!-- 惑星本体 -->
    <radialGradient id="planet" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#e9d5ff"/>
      <stop offset="35%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </radialGradient>
    <!-- 惑星ハイライト -->
    <radialGradient id="highlight" cx="30%" cy="25%" r="45%">
      <stop offset="0%" stop-color="white" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <!-- リンググラデーション -->
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f472b6" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#a78bfa" stop-opacity="1"/>
      <stop offset="70%" stop-color="#60a5fa" stop-opacity="1"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0.7"/>
    </linearGradient>
    <!-- 外周グロー -->
    <radialGradient id="outerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#4f46e5" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0f0c29" stop-opacity="0"/>
    </radialGradient>
    <!-- フィルター -->
    <filter id="glow-filter" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="planet-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="iconClip">
      <rect width="512" height="512" rx="110"/>
    </clipPath>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="256" fill="url(#outerGlow)"/>

  <!-- 星フィールド -->
  <g clip-path="url(#iconClip)" opacity="0.9">
    <circle cx="60" cy="70" r="2.5" fill="white" opacity="0.8"/>
    <circle cx="440" cy="55" r="2" fill="white" opacity="0.6"/>
    <circle cx="480" cy="180" r="1.5" fill="white" opacity="0.7"/>
    <circle cx="30" cy="300" r="2" fill="white" opacity="0.5"/>
    <circle cx="490" cy="380" r="2.5" fill="white" opacity="0.6"/>
    <circle cx="90" cy="430" r="1.5" fill="white" opacity="0.5"/>
    <circle cx="380" cy="460" r="2" fill="white" opacity="0.7"/>
    <circle cx="150" cy="80" r="1.5" fill="#c4b5fd" opacity="0.8"/>
    <circle cx="420" cy="150" r="1.5" fill="#93c5fd" opacity="0.7"/>
    <circle cx="55" cy="200" r="1.5" fill="white" opacity="0.6"/>
    <circle cx="460" cy="290" r="1.5" fill="#f9a8d4" opacity="0.6"/>
    <circle cx="320" cy="50" r="2" fill="white" opacity="0.5"/>
  </g>

  <!-- リング（後ろ側） -->
  <ellipse cx="256" cy="278" rx="194" ry="40" fill="none"
    stroke="url(#ring)" stroke-width="24" opacity="0.45"
    clip-path="url(#iconClip)"/>

  <!-- 惑星本体グロー -->
  <circle cx="256" cy="248" r="130" fill="#7c3aed" opacity="0.35" filter="url(#glow-filter)"/>

  <!-- 惑星本体 -->
  <circle cx="256" cy="248" r="115" fill="url(#planet)" filter="url(#planet-glow)"/>

  <!-- 帯モデル -3本 -->
  <ellipse cx="256" cy="260" rx="115" ry="16"
    fill="none" stroke="rgba(196,165,255,0.18)" stroke-width="14"/>
  <ellipse cx="256" cy="242" rx="100" ry="12"
    fill="none" stroke="rgba(167,139,250,0.12)" stroke-width="10"/>
  <ellipse cx="256" cy="278" rx="90" ry="10"
    fill="none" stroke="rgba(244,114,182,0.12)" stroke-width="8"/>

  <!-- ハイライト -->
  <circle cx="256" cy="248" r="115" fill="url(#highlight)"/>

  <!-- リング（前側） -->
  <path d="M62 278 Q256 346 450 278" fill="none"
    stroke="url(#ring)" stroke-width="24" stroke-linecap="round"
    filter="url(#glow-filter)"
    clip-path="url(#iconClip)"/>

  <!-- 衛星小く 磺石
  -->
  <circle cx="390" cy="118" r="14" fill="#60a5fa" filter="url(#glow-filter)" opacity="0.9"/>
  <circle cx="390" cy="118" r="9" fill="#bfdbfe"/>

  <circle cx="145" cy="400" r="11" fill="#f472b6" filter="url(#glow-filter)" opacity="0.85"/>
  <circle cx="145" cy="400" r="7" fill="#fbcfe8"/>
</svg>
