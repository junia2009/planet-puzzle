<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Planet Puzzle">
  <meta name="theme-color" content="#a78bfa">
  <link rel="manifest" href="manifest.json">
  <title>PLANET PUZZLE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a1a;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(99,51,153,0.25) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(20,80,160,0.25) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 10%, rgba(180,60,100,0.15) 0%, transparent 40%);
      color: #fff;
      font-family: 'Noto Sans JP', sans-serif;
      display: block;
      min-height: 100vh;
    }

    /* 星背景 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 45%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 25%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 75% 55%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 10%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 20% 80%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 70%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 35%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(2px 2px at 65% 90%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 5% 60%, rgba(255,255,255,0.5) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ========== タイトル画面 ========== */
    #title-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 5000;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    #title-screen.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(1.04);
    }

    /* 惑星アニメーション */
    .planet-orbit {
      position: relative;
      width: min(320px, 80vw);
      height: min(320px, 80vw);
      margin-bottom: 32px;
    }

    .planet-main {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: min(9rem, 22vw);
      animation: planet-float 4s ease-in-out infinite;
      filter: drop-shadow(0 0 40px rgba(167,139,250,0.8));
    }

    @keyframes planet-float {
      0%, 100% { transform: translateY(0px) rotate(-3deg); }
      50%       { transform: translateY(-18px) rotate(3deg); }
    }

    .orbit-ring {
      position: absolute;
      inset: 10%;
      border-radius: 50%;
      border: 1px solid rgba(167,139,250,0.2);
      animation: orbit-spin 8s linear infinite;
    }

    .orbit-ring::after {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      background: radial-gradient(circle, #60a5fa, #3b82f6);
      border-radius: 50%;
      top: -6px;
      left: calc(50% - 6px);
      box-shadow: 0 0 10px #60a5fa;
    }

    @keyframes orbit-spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .orbit-ring-2 {
      position: absolute;
      inset: 25%;
      border-radius: 50%;
      border: 1px solid rgba(244,114,182,0.2);
      animation: orbit-spin 5s linear infinite reverse;
    }

    .orbit-ring-2::after {
      content: '';
      position: absolute;
      width: 9px;
      height: 9px;
      background: radial-gradient(circle, #f472b6, #ec4899);
      border-radius: 50%;
      bottom: -4px;
      left: calc(50% - 4px);
      box-shadow: 0 0 8px #f472b6;
    }

    #title-logo {
      font-family: 'Orbitron', sans-serif;
      font-size: min(3rem, 10vw);
      font-weight: 900;
      letter-spacing: 6px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      margin-bottom: 8px;
      filter: drop-shadow(0 0 20px rgba(167,139,250,0.5));
    }

    #title-sub {
      font-size: 0.85rem;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      margin-bottom: 48px;
    }

    #start-btn {
      position: relative;
      padding: 18px 56px;
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 3px;
      color: #fff;
      background: transparent;
      border: 1.5px solid rgba(167,139,250,0.6);
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s;
      overflow: hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    #start-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(167,139,250,0.15), rgba(96,165,250,0.15));
      opacity: 0;
      transition: opacity 0.3s;
    }

    #start-btn:hover::before, #start-btn:active::before { opacity: 1; }

    #start-btn:hover {
      border-color: rgba(167,139,250,1);
      box-shadow: 0 0 30px rgba(167,139,250,0.5), inset 0 0 20px rgba(167,139,250,0.1);
      transform: translateY(-2px);
    }

    /* 流れ星 */
    .shooting-star {
      position: fixed;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      pointer-events: none;
      animation: shoot linear forwards;
    }

    @keyframes shoot {
      0%   { transform: translate(0, 0) scaleX(1); opacity: 1; }
      100% { transform: translate(200px, 200px) scaleX(40); opacity: 0; }
    }

    /* ゲーム画面 */
    #game-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      width: 100%;
      min-height: 100vh;
      padding: 20px 16px max(24px, env(safe-area-inset-bottom, 24px));
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.5s ease 0.3s, transform 0.5s ease 0.3s;
      pointer-events: none;
    }

    #game-screen.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: 4px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
      position: relative;
      z-index: 1;
    }

    #info-bar {
      display: flex;
      gap: 24px;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.45);
      margin-bottom: 14px;
      letter-spacing: 1px;
      position: relative;
      z-index: 1;
    }

    #info-bar span {
      color: #a78bfa;
      font-weight: 700;
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
    }

    /* ゲームエリアラッパ（レスポンシブ高さ調整） */
    #game-wrapper {
      position: relative;
      width: min(560px, calc(100vw - 32px));
      z-index: 1;
      margin-bottom: 16px;
    }

    /* ゲームエリア */
    #game-area {
      position: relative;
      width: 560px;
      height: 700px;
      background: rgba(255,255,255,0.03);
      border-radius: 20px;
      border: 1px solid rgba(167,139,250,0.25);
      overflow: hidden;
      box-shadow:
        0 0 40px rgba(99,51,153,0.3),
        inset 0 0 60px rgba(0,0,0,0.4);
      transform-origin: top left;
    }

    /* タイル */
    .tile {
      position: absolute;
      width: 70px;
      height: 70px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      cursor: pointer;
      user-select: none;
      border: 1.5px solid rgba(255,255,255,0.35);
      transition: transform 0.12s, box-shadow 0.12s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.4);
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .tile:hover:not(.blocked) {
      transform: scale(1.1) translateY(-2px);
      box-shadow: 0 6px 20px rgba(167,139,250,0.5), inset 0 1px 0 rgba(255,255,255,0.5);
      z-index: 9999 !important;
    }

    .tile.blocked {
      cursor: not-allowed;
      filter: brightness(0.45) saturate(0.5);
    }

    /* ===== 惑星タイル個別スタイル ===== */
    /* 0:☀️太陽 - 燃えるオレンジ〜黄 */
    .tile-0 {
      background: linear-gradient(145deg, #fff7e0, #ffe066);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.6), 0 0 12px rgba(255,200,0,0.4);
      border-color: rgba(255,210,50,0.5);
    }
    /* 1:🌕月 - 淡いクレーター灰白 */
    .tile-1 {
      background: linear-gradient(145deg, #f5f5e8, #dcdcb0);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.5);
      border-color: rgba(200,200,150,0.4);
    }
    /* 2:🌍地球 - 青緑 */
    .tile-2 {
      background: linear-gradient(145deg, #e0f4ff, #b3e8cc);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.5), 0 0 10px rgba(50,200,150,0.25);
      border-color: rgba(80,200,160,0.4);
    }
    /* 3:🪐土星 - 淡いゴールドリング */
    .tile-3 {
      background: linear-gradient(145deg, #fdf6e0, #f5dfa0);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.5), 0 0 10px rgba(220,180,80,0.3);
      border-color: rgba(210,170,70,0.5);
    }
    /* 4:🔴火星 - 赤茶 */
    .tile-4 {
      background: linear-gradient(145deg, #ffe8e0, #f5b0a0);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.5), 0 0 10px rgba(220,80,60,0.25);
      border-color: rgba(220,100,80,0.4);
    }
    /* 5:🔵海王星 - 深めの青 */
    .tile-5 {
      background: linear-gradient(145deg, #e0eeff, #a0c4f5);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.5), 0 0 10px rgba(60,120,240,0.25);
      border-color: rgba(80,140,230,0.4);
    }
    /* 6:🟠木星 - オレンジ縞模様風 */
    .tile-6 {
      background: repeating-linear-gradient(160deg, #fde8c8 0px, #fde8c8 6px, #f5caa0 6px, #f5caa0 12px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.4);
      border-color: rgba(210,150,80,0.4);
    }
    /* 7:🟡金星 - 淡い黄 */
    .tile-7 {
      background: linear-gradient(145deg, #fffbe0, #f5e890);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.6), 0 0 10px rgba(240,220,50,0.3);
      border-color: rgba(220,200,60,0.4);
    }
    /* 8:⚫水星 - 暗いグレー */
    .tile-8 {
      background: linear-gradient(145deg, #e8e8e8, #c0c0c0);
      box-shadow: 0 2px 8px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.3);
      border-color: rgba(160,160,160,0.4);
    }
    /* 9:🟣天王星 - 青みがかった紫 */
    .tile-9 {
      background: linear-gradient(145deg, #f0eaff, #c8b0f0);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.5), 0 0 10px rgba(160,100,240,0.25);
      border-color: rgba(160,120,230,0.4);
    }

    /* スロットエリア */
    #slot-area {
      display: flex;
      gap: 6px;
      width: min(560px, calc(100vw - 32px));
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      border: 1px solid rgba(167,139,250,0.2);
      padding: 12px 16px;
      margin-bottom: 16px;
      min-height: 88px;
      align-items: center;
      overflow-x: auto;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
      position: relative;
      z-index: 1;
    }

    .slot {
      width: var(--slot-size, 58px);
      height: var(--slot-size, 58px);
      min-width: var(--slot-size, 58px);
      border-radius: 12px;
      border: 1.5px dashed rgba(255,255,255,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: calc(var(--slot-size, 58px) * 0.55);
      transition: all 0.2s;
      background: rgba(255,255,255,0.04);
    }

    .slot.extra {
      border-color: rgba(251,191,36,0.6);
      box-shadow: 0 0 12px rgba(251,191,36,0.3);
      background: rgba(251,191,36,0.06);
    }

    .slot.filled {
      border-style: solid;
      border-color: rgba(255,255,255,0.3);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.3);
    }

    /* スキルエリア */
    #skill-area {
      display: flex;
      gap: 16px;
      width: min(560px, calc(100vw - 32px));
      justify-content: center;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }

    .skill-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 12px 20px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(8px);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.2s;
      color: rgba(255,255,255,0.8);
      min-width: min(90px, calc((100vw - 96px) / 3));
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .skill-btn .skill-icon {
      font-size: 1.6rem;
      line-height: 1;
    }

    .skill-btn:disabled {
      opacity: 0.25;
      cursor: not-allowed;
    }

    #skill-shuffle { border-color: rgba(96,165,250,0.4); }
    #skill-shuffle:not(:disabled):hover {
      background: rgba(96,165,250,0.15);
      border-color: rgba(96,165,250,0.7);
      box-shadow: 0 0 16px rgba(96,165,250,0.3);
      transform: translateY(-2px);
    }

    #skill-undo { border-color: rgba(167,139,250,0.4); }
    #skill-undo:not(:disabled):hover {
      background: rgba(167,139,250,0.15);
      border-color: rgba(167,139,250,0.7);
      box-shadow: 0 0 16px rgba(167,139,250,0.3);
      transform: translateY(-2px);
    }

    #skill-expand { border-color: rgba(251,191,36,0.4); }
    #skill-expand:not(:disabled):hover {
      background: rgba(251,191,36,0.12);
      border-color: rgba(251,191,36,0.7);
      box-shadow: 0 0 16px rgba(251,191,36,0.3);
      transform: translateY(-2px);
    }

    /* オーバーレイ */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }

    #overlay.show { display: flex; }

    #overlay-box {
      background: rgba(15,10,40,0.95);
      border: 1px solid rgba(167,139,250,0.35);
      border-radius: 24px;
      padding: 48px 56px;
      text-align: center;
      box-shadow: 0 0 60px rgba(99,51,153,0.5), 0 0 120px rgba(99,51,153,0.2);
    }

    #overlay-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.2rem;
      font-weight: 900;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #overlay-msg {
      color: rgba(255,255,255,0.6);
      font-size: 1rem;
      margin-bottom: 8px;
    }

    #overlay-btn {
      margin-top: 24px;
      padding: 14px 40px;
      border-radius: 12px;
      border: 1px solid rgba(167,139,250,0.5);
      background: linear-gradient(135deg, rgba(167,139,250,0.2), rgba(96,165,250,0.2));
      color: #fff;
      font-size: 1rem;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.2s;
    }

    #overlay-btn:hover {
      background: linear-gradient(135deg, rgba(167,139,250,0.4), rgba(96,165,250,0.4));
      box-shadow: 0 0 20px rgba(167,139,250,0.4);
      transform: translateY(-1px);
    }

    /* ===== クリア専用オーバーレイ ===== */
    #clear-overlay {
      display: none;
      position: fixed;
      inset: 0;
      align-items: center;
      justify-content: center;
      z-index: 10001;
      pointer-events: none;
    }
    #clear-overlay.show {
      display: flex;
      pointer-events: auto;
    }
    #clear-box {
      background: rgba(10,5,30,0.92);
      border: 1px solid rgba(167,139,250,0.5);
      border-radius: 28px;
      padding: 52px 60px;
      text-align: center;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 80px rgba(167,139,250,0.6), 0 0 160px rgba(96,165,250,0.3);
      animation: clear-box-in 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes clear-box-in {
      from { transform: scale(0.5) rotate(-4deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    #clear-box::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 28px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa, #f472b6, #a78bfa);
      background-size: 300% 300%;
      animation: border-flow 2.5s linear infinite;
      z-index: -1;
    }
    @keyframes border-flow {
      0%   { background-position: 0% 50%; }
      100% { background-position: 300% 50%; }
    }
    #clear-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.4rem;
      font-weight: 900;
      background: linear-gradient(135deg, #fbbf24, #f472b6, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      animation: clear-title-pop 0.5s 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes clear-title-pop {
      from { transform: scale(0.3); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    #clear-planet {
      font-size: 4rem;
      display: block;
      margin-bottom: 8px;
      animation: clear-planet-spin 1s 0.2s ease-out both;
    }
    @keyframes clear-planet-spin {
      from { transform: scale(0) rotate(-360deg); }
      to   { transform: scale(1) rotate(0deg); }
    }
    #clear-msg {
      color: rgba(255,255,255,0.7);
      font-size: 0.95rem;
      margin-bottom: 4px;
      animation: fade-in 0.5s 0.6s both;
    }
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    #clear-btn {
      margin-top: 28px;
      padding: 14px 40px;
      border-radius: 12px;
      border: 1px solid rgba(167,139,250,0.5);
      background: linear-gradient(135deg, rgba(167,139,250,0.25), rgba(96,165,250,0.25));
      color: #fff;
      font-size: 1rem;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.2s;
      animation: fade-in 0.5s 0.8s both;
      touch-action: manipulation;
    }
    #clear-btn:hover {
      background: linear-gradient(135deg, rgba(167,139,250,0.45), rgba(96,165,250,0.45));
      box-shadow: 0 0 20px rgba(167,139,250,0.5);
      transform: translateY(-2px);
    }

    /* 紙吹雪パーティクル */
    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      pointer-events: none;
      animation: confetti-fall linear forwards;
      z-index: 10002;
    }
    @keyframes confetti-fall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }

    /* キラキラ星バースト */
    .star-burst {
      position: fixed;

      pointer-events: none;
      animation: star-burst-anim ease-out forwards;
      z-index: 10002;
    }
    @keyframes star-burst-anim {
      0%   { transform: scale(0) rotate(0deg); opacity: 1; }
      60%  { transform: scale(1.4) rotate(180deg); opacity: 1; }
      100% { transform: scale(0.5) rotate(360deg) translateY(-60px); opacity: 0; }
    }
  </style>
</head>
<body>

<div id="title-screen">

  <div id="title-sub">Match the planets · Clear the sky</div>
  <div style="position:absolute;bottom:max(24px,env(safe-area-inset-bottom,24px));font-size:0.7rem;letter-spacing:2px;color:rgba(255,255,255,0.2);font-family:'Orbitron',sans-serif;">ver 1.11.0</div>
  <button id="start-btn">GAME START</button>
</div>

<div id="game-screen">
<h1>PLANET PUZZLE</h1>

  残りタイル &nbsp;<span id="tile-count">0</span>
</div>

  <div id="game-area"></div>
</div>

<div id="slot-area"></div>

<div id="skill-area">
  <button class="skill-btn" id="skill-shuffle">
    <span class="skill-icon">🔀</span>シャッフル
  </button>

    <span class="skill-icon">↩️</span>元に戻す
  </button>

    <span class="skill-icon">➕</span>スロット拡張
  </button>

</div>

  <div id="overlay-box">
    <div id="overlay-title"></div>
    <div id="overlay-msg"></div>
    <button id="overlay-btn">タイトルに戻る</button>
  </div>
</div>

<div id="clear-overlay">
  <div id="clear-box">
    <span id="clear-planet">🪐</span>
    <div id="clear-title">MISSION<br>COMPLETE</div>
    <div id="clear-msg">すべての惑星を解放した！</div>
    <button id="clear-btn">タイトルに戻る</button>
  </div>
</div>

<script>
// ===== 定数 =====
// 惑星・天体テーマ（太陽系8惑星＋太陽＋月）
const TILE_TYPES = ['☀️','🌕','🌍','🪐','🔴','🔵','🟠','🟡','⚫','🟣'];
const TILE_COUNT_EACH = 27;  // 各タイル種類の枚数（3の倍数）→ 合計270枚
const GAME_W = 560, GAME_H = 700;
const TILE_SIZE = 70;
const BASE_SLOTS = 7;
const SLOT_EXPAND = 3;
const LAYERS = 6;             // 積み重ねレイヤー数（Mahjong式6層）
const CELL_SPACING = 70;      // 使用しない（TILE_SIZEと同値）
const GRID_COLS = 7;          // 各層の列数
const GRID_ROWS = 9;          // 各層の行数（縦スペースを活用）
const JITTER = 0;             // グリッド配置なのでずれなし

// ===== 状態 =====
let tiles = [];         // { id, type, x, y, layer, elem, blocked }
let slots = [];         // スロットに入ったタイル種類の配列
let slotTypeOrder = []; // 各タイプの初登場順
let extraSlots = 0;     // スロット拡張数
let history = [];       // アンドゥ用スタック [{tiles, slots}]
let gameOver = false;

// ===== 初期化 =====
function init() {
  tiles = [];
  slots = [];
  slotTypeOrder = [];
  extraSlots = 0;
  history = [];
  gameOver = false;

  document.getElementById('game-area').innerHTML = '';
  document.getElementById('skill-shuffle').disabled = false;
  document.getElementById('skill-undo').disabled = true;
  document.getElementById('skill-expand').disabled = false;

  generateTiles();
  updateBlockedState();
  renderSlots();
  updateTileCount();
}

// ===== タイル生成 =====
function generateTiles() {
  const gameArea = document.getElementById('game-area');

  // タイルの種類プール（各TILE_COUNT_EACH枚）
  let pool = [];
  TILE_TYPES.forEach((t, i) => {
    for (let k = 0; k < TILE_COUNT_EACH; k++) pool.push({ type: i });
  });
  shuffle(pool);

  let id = 0;

  // ===== パイル（深積み）生成 =====
  const PILE_EACH = 12;
  const PILE_STEP = 5;
  // パイルはゲームエリア左端固定
  const pileBaseX = 15;
  [150, 430].forEach((baseY) => {
    for (let d = 0; d < PILE_EACH; d++) {
      const p = pool.shift();
      const tileY = baseY + d * PILE_STEP;
      const zIndex = 2000 - d * 5;
      const elem = document.createElement('div');
      elem.className = `tile tile-${p.type}`;
      elem.style.left   = pileBaseX + 'px';
      elem.style.top    = tileY + 'px';
      elem.style.zIndex = zIndex;
      elem.textContent  = TILE_TYPES[p.type];
      elem.dataset.id   = id;
      const tile = { id, type: p.type, x: pileBaseX, y: tileY, layer: 20, zIndex, elem, blocked: false };
      tiles.push(tile);
      elem.addEventListener('click', () => onTileClick(tile.id));
      gameArea.appendChild(elem);
      id++;
    }
  });

  // ===== 通常タイル生成（Mahjong式3層積み） =====
  // 【構造】
  //   各層は GRID_COLS×GRID_ROWS の独立グリッド（同層内は絶対に重ならない）
  //   偶数層(0,2): オフセット(0, 0)
  //   奇数層(1)  : オフセット(TILE_SIZE/2, TILE_SIZE/2) = (35, 35px)
  //   → 上層の1タイルが下層の最大4タイルに跨がる
  //   → 1枚取り除くと真下の最大4枚が露出する
  const HALF = Math.floor(TILE_SIZE / 2); // 35px
  // GRID_COLS=7, GAME_W=560 → (560-7*70)/2 = 35px
  // GRID_ROWS=9, GAME_H=700 → (700-9*70)/2 = 35px
  const baseStartX = Math.round((GAME_W - GRID_COLS * TILE_SIZE) / 2);
  const baseStartY = Math.round((GAME_H - GRID_ROWS * TILE_SIZE) / 2);
  const tilesPerLayer = Math.floor(pool.length / LAYERS); // 246/6 = 41

  for (let layer = 0; layer < LAYERS; layer++) {
    // 偶数層はオフセット0、奇数層は半タイルずらす
    const ox = (layer % 2) * HALF;
    const oy = (layer % 2) * HALF;
    const startX = baseStartX + ox;
    const startY = baseStartY + oy;

    // この層の全セル（GRID_COLS×GRID_ROWS = 42セル）をシャッフル
    const cells = [];
    for (let r = 0; r < GRID_ROWS; r++) {
      for (let c = 0; c < GRID_COLS; c++) {
        cells.push({ c, r });
      }
    }
    shuffle(cells);

    // この層のタイル数（最終層は余り全部）
    const count = (layer < LAYERS - 1) ? tilesPerLayer : pool.length;

    for (let i = 0; i < count && i < cells.length && pool.length > 0; i++) {
      const p = pool.shift();
      const { c, r } = cells[i];
      const x = startX + c * TILE_SIZE;
      const y = startY + r * TILE_SIZE;
      // 層ごとに明確にzIndexを分離（層間の差を大きくとる）
      const zIndex = 100 + layer * 300;

      const elem = document.createElement('div');
      elem.className = `tile tile-${p.type}`;
      elem.style.left   = x + 'px';
      elem.style.top    = y + 'px';
      elem.style.zIndex = zIndex;
      elem.textContent  = TILE_TYPES[p.type];
      elem.dataset.id   = id;

      const tile = { id, type: p.type, x, y, layer, zIndex, elem, blocked: false };
      tiles.push(tile);
      elem.addEventListener('click', () => onTileClick(tile.id));
      gameArea.appendChild(elem);
      id++;
    }
  }
}

// ===== ブロック状態更新 =====
// あるタイルの上に（zIndexが大きく、座標が重なる）別のタイルがあればブロック
function updateBlockedState() {
  tiles.forEach(t => {
    t.blocked = tiles.some(other => {
      if (other.id === t.id) return false;
      // zIndexが低ければブロックしない。同じzIndexの場合はid大（DOM後方）が視覚的に上
      if (other.zIndex < t.zIndex) return false;
      if (other.zIndex === t.zIndex && other.id <= t.id) return false;
      return rectsOverlap(t, other);
    });
    t.elem.classList.toggle('blocked', t.blocked);
  });
}

function rectsOverlap(a, b) {
  const margin = 3; // 隣接セル（50px間隔）の5px重なりも検出
  return (
    a.x < b.x + TILE_SIZE - margin &&
    a.x + TILE_SIZE - margin > b.x &&
    a.y < b.y + TILE_SIZE - margin &&
    a.y + TILE_SIZE - margin > b.y
  );
}

// ===== タイルクリック =====
function onTileClick(id) {
  if (gameOver) return;
  const tile = tiles.find(t => t.id === id);
  if (!tile || tile.blocked) return;

  const totalSlots = BASE_SLOTS + extraSlots;
  if (slots.length >= totalSlots) return;

  // アンドゥ用スナップショット
  saveHistory();

  // スロットに追加して初登場順でグループソート
  if (!slotTypeOrder.includes(tile.type)) slotTypeOrder.push(tile.type);
  slots.push(tile.type);
  slots.sort((a, b) => slotTypeOrder.indexOf(a) - slotTypeOrder.indexOf(b));

  // タイルをゲームエリアから除去
  tile.elem.remove();
  tiles = tiles.filter(t => t.id !== id);

  updateBlockedState();

  // 同じ種類が3つ揃ったか確認
  checkMatch();

  renderSlots();
  updateTileCount();
  checkGameState();
}

// ===== マッチチェック =====
function checkMatch() {
  TILE_TYPES.forEach((_, type) => {
    const count = slots.filter(s => s === type).length;
    if (count >= 3) {
      // 3つ消す
      let removed = 0;
      slots = slots.filter(s => {
        if (s === type && removed < 3) { removed++; return false; }
        return true;
      });
    }
  });
}

// ===== スロット描画 =====
function renderSlots() {
  const area = document.getElementById('slot-area');
  area.innerHTML = '';
  const totalSlots = BASE_SLOTS + extraSlots;

  for (let i = 0; i < totalSlots; i++) {
    const div = document.createElement('div');
    div.className = 'slot';
    if (i >= BASE_SLOTS) div.classList.add('extra');
    if (slots[i] !== undefined) {
      div.classList.add('filled');
      div.style.background = getTileColor(slots[i]);
      div.style.border = '2px solid rgba(255,255,255,0.4)';
      div.textContent = TILE_TYPES[slots[i]];
    }
    area.appendChild(div);
  }
}

function getTileColor(type) {
  const colors = ['#ffe066','#dcdcb0','#b3e8cc','#f5dfa0','#f5b0a0','#a0c4f5','#f5caa0','#f5e890','#c0c0c0','#c8b0f0'];
  return colors[type] || '#f5f5f5';
}

// ===== タイル残数更新 =====
function updateTileCount() {
  document.getElementById('tile-count').textContent = tiles.length;
}

// ===== ゲーム状態チェック =====
function checkGameState() {
  if (tiles.length === 0) {
    showClearOverlay();
    gameOver = true;
    return;
  }
  const totalSlots = BASE_SLOTS + extraSlots;
  if (slots.length >= totalSlots) {
    showOverlay('💀 ゲームオーバー', 'スロットがいっぱいになりました。');
    gameOver = true;
  }
}

// ===== スキル =====
document.getElementById('skill-shuffle').addEventListener('click', () => {
  if (gameOver) return;
  saveHistory();
  shuffleTilePositions();
  updateBlockedState();
});

document.getElementById('skill-undo').addEventListener('click', () => {
  if (gameOver || history.length === 0) return;
  restoreHistory();
});

document.getElementById('skill-expand').addEventListener('click', () => {
  if (gameOver) return;
  extraSlots += SLOT_EXPAND;
  document.getElementById('skill-expand').disabled = true;
  resizeGame();
  renderSlots();
});

function shuffleTilePositions() {
  // 位置はそのまま、タイルの種類だけをシャッフルする
  const types = tiles.map(t => t.type);
  shuffle(types);
  tiles.forEach((tile, i) => {
    tile.type = types[i];
    tile.elem.textContent = TILE_TYPES[types[i]];
    tile.elem.className = `tile tile-${types[i]}`;
  });
}

// ===== アンドゥ =====
function saveHistory() {
  history.push({
    tiles: tiles.map(t => ({ ...t })),
    slots: [...slots],
    slotTypeOrder: [...slotTypeOrder],
    extraSlots
  });
  document.getElementById('skill-undo').disabled = false;
}

function restoreHistory() {
  if (history.length === 0) return;
  const snap = history.pop();

  // 現在のタイルDOM削除
  tiles.forEach(t => t.elem.remove());

  const gameArea = document.getElementById('game-area');

  tiles = snap.tiles.map(st => {
    // DOM再生成
    const elem = document.createElement('div');
    elem.className = `tile tile-${st.type}`;
    elem.style.left = st.x + 'px';
    elem.style.top  = st.y + 'px';
    elem.style.zIndex = st.zIndex;
    elem.textContent = TILE_TYPES[st.type];
    elem.dataset.id = st.id;
    const tile = { ...st, elem };
    elem.addEventListener('click', () => onTileClick(tile.id));
    gameArea.appendChild(elem);
    return tile;
  });

  slots = snap.slots;
  slotTypeOrder = snap.slotTypeOrder || [];
  extraSlots = snap.extraSlots;

  updateBlockedState();
  renderSlots();
  updateTileCount();

  if (history.length === 0) {
    document.getElementById('skill-undo').disabled = true;
  }
}

// ===== オーバーレイ =====
function showOverlay(title, msg) {
  document.getElementById('overlay-title').textContent = title;
  document.getElementById('overlay-msg').textContent = msg;
  document.getElementById('overlay').classList.add('show');
}

function showClearOverlay() {
  document.getElementById('clear-overlay').classList.add('show');
  launchConfetti();
}

function launchConfetti() {
  const colors = ['#a78bfa','#60a5fa','#f472b6','#fbbf24','#34d399','#f87171','#e0c97f'];
  const emojis = ['⭐','✨','🌟','💫','🪐','🌍','☀️','🌕'];

  // 紙吹雪 80枚
  for (let i = 0; i < 80; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.width  = (8 + Math.random() * 10) + 'px';
      el.style.height = (8 + Math.random() * 10) + 'px';
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      el.style.animationDuration = (1.5 + Math.random() * 2.5) + 's';
      el.style.animationDelay = '0s';
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }, i * 30);
  }

  // 星バースト 20個
  for (let i = 0; i < 20; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'star-burst';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = (10 + Math.random() * 80) + 'vw';
      el.style.top  = (10 + Math.random() * 70) + 'vh';
      el.style.animationDuration = (0.8 + Math.random() * 1.2) + 's';
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }, i * 100);
  }
}

document.getElementById('clear-btn').addEventListener('click', () => {
  document.getElementById('clear-overlay').classList.remove('show');
  const gameScreen = document.getElementById('game-screen');
  gameScreen.classList.remove('visible');
  const titleScreen = document.getElementById('title-screen');
  titleScreen.style.display = '';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    titleScreen.classList.remove('hidden');
  }));
});

document.getElementById('overlay-btn').addEventListener('click', () => {
  document.getElementById('overlay').classList.remove('show');

  // ゲーム画面を非表示
  const gameScreen = document.getElementById('game-screen');
  gameScreen.classList.remove('visible');

  // タイトル画面を再表示
  const titleScreen = document.getElementById('title-screen');
  titleScreen.style.display = '';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      titleScreen.classList.remove('hidden');
    });
  });
});

// ===== ユーティリティ =====
function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = randInt(0, i);
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ===== レスポンシブ対応 =====
function resizeGame() {
  const availW = Math.min(560, window.innerWidth - 32);
  const scale = availW / 560;

  const wrapper = document.getElementById('game-wrapper');
  const gameArea = document.getElementById('game-area');
  if (wrapper && gameArea) {
    gameArea.style.transform = `scale(${scale})`;
    wrapper.style.height = (700 * scale) + 'px';
  }

  // スロットサイズをビューポート幅に応じて動的調整
  const totalSlots = BASE_SLOTS + extraSlots;
  const innerW = availW - 32; // padding 16px × 2
  const gapTotal = (totalSlots - 1) * 6;
  const slotSize = Math.max(32, Math.min(58, Math.floor((innerW - gapTotal) / totalSlots)));
  document.documentElement.style.setProperty('--slot-size', slotSize + 'px');
}

window.addEventListener('resize', resizeGame);
window.addEventListener('orientationchange', () => setTimeout(resizeGame, 150));

// ===== PWA: apple-touch-icon を2D Canvasで動的生成（スターウォーズ風） =====
(function () {
  try {
    const c = document.createElement('canvas');
    c.width = c.height = 180;
    const ctx = c.getContext('2d');

    // 背景（深宇宙黒＋青みグロー）
    const bg = ctx.createRadialGradient(90, 80, 10, 90, 80, 105);
    bg.addColorStop(0,   '#091420');
    bg.addColorStop(0.62,'#030c18');
    bg.addColorStop(1,   '#000004');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, 180, 180);

    // 星フィールド
    [[14,18,1.1,1],[40,10,0.8,1],[68,22,1,1],[101,7,1.3,1],[130,16,0.8,1],
     [158,24,1.1,1],[172,50,0.8,1],[10,57,1,1],[170,82,1.1,1],[7,105,0.8,1],
     [173,116,1,1],[23,142,1.2,1],[152,137,0.8,1],[55,165,1,1],[112,172,1.2,1],
     [27,34,1.5,2],[155,65,1.4,2],[34,125,1.4,2],[162,156,1.5,2]]
      .forEach(([x,y,r,t]) => {
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI*2);
        ctx.fillStyle = t === 2 ? 'rgba(192,234,255,0.85)' : 'rgba(255,255,255,0.72)';
        ctx.fill();
      });

    // 惑星グロー
    const pg = ctx.createRadialGradient(90, 90, 28, 90, 90, 60);
    pg.addColorStop(0, 'rgba(26,64,96,0.65)');
    pg.addColorStop(1, 'rgba(0,16,32,0)');
    ctx.fillStyle = pg;
    ctx.save();
    ctx.shadowBlur = 20;
    ctx.shadowColor = '#1a4060';
    ctx.beginPath();
    ctx.arc(90, 90, 56, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    // 惑星本体（メタリックシルバー）
    const pm = ctx.createRadialGradient(76, 68, 4, 90, 90, 52);
    pm.addColorStop(0,    '#d4e2ec');
    pm.addColorStop(0.22, '#8aacc0');
    pm.addColorStop(0.68, '#2e4860');
    pm.addColorStop(1,    '#0a1828');
    ctx.beginPath();
    ctx.arc(90, 90, 52, 0, Math.PI*2);
    ctx.fillStyle = pm;
    ctx.fill();

    // 表面ライン（デス・スター風）クリップ
    ctx.save();
    ctx.beginPath();
    ctx.arc(90, 90, 52, 0, Math.PI*2);
    ctx.clip();
    // 赤道線
    ctx.strokeStyle = 'rgba(96,144,176,0.52)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(38, 90); ctx.lineTo(142, 90); ctx.stroke();
    // 縦線
    ctx.strokeStyle = 'rgba(96,144,176,0.18)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(90, 38); ctx.lineTo(90, 142); ctx.stroke();
    // 補助線
    ctx.strokeStyle = 'rgba(96,144,176,0.13)';
    ctx.beginPath(); ctx.moveTo(38, 72); ctx.lineTo(142, 72); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(38, 108); ctx.lineTo(142, 108); ctx.stroke();
    ctx.restore();

    // スーパーレーザーくぼみ（デス・スター特徴）
    const dx = 109, dy = 70;
    ctx.save();
    ctx.beginPath();
    ctx.arc(90, 90, 52, 0, Math.PI*2);
    ctx.clip();
    // 外リング
    ctx.strokeStyle = 'rgba(128,168,196,0.55)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(dx, dy, 14, 0, Math.PI*2); ctx.stroke();
    // くぼみ暗部
    ctx.fillStyle = 'rgba(6,14,24,0.88)';
    ctx.beginPath(); ctx.arc(dx, dy, 9, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#0a1e30';
    ctx.beginPath(); ctx.arc(dx, dy, 5, 0, Math.PI*2); ctx.fill();
    // 光るコア
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#00c8f8';
    ctx.fillStyle = 'rgba(0,200,248,0.88)';
    ctx.beginPath(); ctx.arc(dx, dy, 3, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'white';
    ctx.beginPath(); ctx.arc(dx, dy, 1.5, 0, Math.PI*2); ctx.fill();
    ctx.restore();

    // ライトセーバー光線（水平・赤道上）
    const sg = ctx.createLinearGradient(0, 0, 180, 0);
    sg.addColorStop(0,    'rgba(0,200,240,0)');
    sg.addColorStop(0.2,  'rgba(0,200,240,0.92)');
    sg.addColorStop(0.5,  'rgba(168,240,255,1)');
    sg.addColorStop(0.8,  'rgba(0,200,240,0.92)');
    sg.addColorStop(1,    'rgba(0,200,240,0)');
    ctx.shadowBlur = 12;
    ctx.shadowColor = '#00c8f8';
    ctx.fillStyle = sg;
    ctx.fillRect(0, 87, 180, 6);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 0.8;
    ctx.fillStyle = sg;
    ctx.fillRect(0, 89, 180, 2);
    ctx.globalAlpha = 1;

    // ハイライト
    const hl = ctx.createRadialGradient(74, 64, 2, 78, 70, 30);
    hl.addColorStop(0, 'rgba(255,255,255,0.30)');
    hl.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.save();
    ctx.beginPath();
    ctx.arc(90, 90, 52, 0, Math.PI*2);
    ctx.clip();
    ctx.fillStyle = hl;
    ctx.fillRect(0, 0, 180, 180);
    ctx.restore();

    const link = document.createElement('link');
    link.rel = 'apple-touch-icon';
    link.href = c.toDataURL('image/png');
    document.head.appendChild(link);
  } catch (e) {}
})();

// ===== Service Worker 登録 =====
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

// ===== スタート =====
resizeGame();

// タイトル画面制御
document.getElementById('start-btn').addEventListener('click', () => {
  const titleScreen = document.getElementById('title-screen');
  const gameScreen  = document.getElementById('game-screen');

  titleScreen.classList.add('hidden');
  setTimeout(() => { titleScreen.style.display = 'none'; }, 650);

  gameScreen.classList.add('visible');
  init();
});

// 流れ星を定期生成
function spawnShootingStar() {
  const star = document.createElement('div');
  star.className = 'shooting-star';
  star.style.top  = Math.random() * 60 + 'vh';
  star.style.left = Math.random() * 80 + 'vw';
  star.style.animationDuration = (0.6 + Math.random() * 0.8) + 's';
  document.body.appendChild(star);
  star.addEventListener('animationend', () => star.remove());
}
setInterval(spawnShootingStar, 2200);
</script>
