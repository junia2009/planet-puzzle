<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLANET PUZZLE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a1a;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(99,51,153,0.25) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(20,80,160,0.25) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 10%, rgba(180,60,100,0.15) 0%, transparent 40%);
      color: #fff;
      font-family: 'Noto Sans JP', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px 16px;
    }

    /* 星背景 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 45%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 25%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 75% 55%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 10%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 20% 80%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 70%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 35%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(2px 2px at 65% 90%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 5% 60%, rgba(255,255,255,0.5) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: 4px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
      position: relative;
      z-index: 1;
    }

    #info-bar {
      display: flex;
      gap: 24px;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.45);
      margin-bottom: 14px;
      letter-spacing: 1px;
      position: relative;
      z-index: 1;
    }

    #info-bar span {
      color: #a78bfa;
      font-weight: 700;
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
    }

    /* ゲームエリア */
    #game-area {
      position: relative;
      width: 560px;
      height: 560px;
      background: rgba(255,255,255,0.03);
      border-radius: 20px;
      border: 1px solid rgba(167,139,250,0.25);
      margin-bottom: 16px;
      overflow: hidden;
      box-shadow:
        0 0 40px rgba(99,51,153,0.3),
        inset 0 0 60px rgba(0,0,0,0.4);
      z-index: 1;
    }

    /* タイル */
    .tile {
      position: absolute;
      width: 60px;
      height: 60px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.9rem;
      cursor: pointer;
      user-select: none;
      border: 1.5px solid rgba(255,255,255,0.35);
      transition: transform 0.12s, box-shadow 0.12s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.4);
    }

    .tile:hover:not(.blocked) {
      transform: scale(1.1) translateY(-2px);
      box-shadow: 0 6px 20px rgba(167,139,250,0.5), inset 0 1px 0 rgba(255,255,255,0.5);
      z-index: 9999 !important;
    }

    .tile.blocked {
      cursor: not-allowed;
      filter: brightness(0.45) saturate(0.5);
    }

    /* タイル種類ごとの背景色（淡いパステル統一） */
    .tile-0 { background: linear-gradient(145deg, #fff5f5, #fde8e8); }
    .tile-1 { background: linear-gradient(145deg, #fff8f0, #fdebd0); }
    .tile-2 { background: linear-gradient(145deg, #fffef0, #fef9e7); }
    .tile-3 { background: linear-gradient(145deg, #f0fdf6, #e8f8f0); }
    .tile-4 { background: linear-gradient(145deg, #f0fdfb, #e8f6f3); }
    .tile-5 { background: linear-gradient(145deg, #f0f8ff, #e8f4fc); }
    .tile-6 { background: linear-gradient(145deg, #faf0ff, #f3eaf9); }
    .tile-7 { background: linear-gradient(145deg, #fff0f8, #fde8f1); }
    .tile-8 { background: linear-gradient(145deg, #f0fdff, #e8f7fa); }
    .tile-9 { background: linear-gradient(145deg, #f5fff0, #f0f8e8); }

    /* スロットエリア */
    #slot-area {
      display: flex;
      gap: 6px;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      border: 1px solid rgba(167,139,250,0.2);
      padding: 12px 16px;
      margin-bottom: 16px;
      min-height: 88px;
      align-items: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
      position: relative;
      z-index: 1;
    }

    .slot {
      width: 58px;
      height: 58px;
      border-radius: 12px;
      border: 1.5px dashed rgba(255,255,255,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.9rem;
      transition: all 0.2s;
      background: rgba(255,255,255,0.04);
    }

    .slot.extra {
      border-color: rgba(251,191,36,0.6);
      box-shadow: 0 0 12px rgba(251,191,36,0.3);
      background: rgba(251,191,36,0.06);
    }

    .slot.filled {
      border-style: solid;
      border-color: rgba(255,255,255,0.3);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.3);
    }

    /* スキルエリア */
    #skill-area {
      display: flex;
      gap: 16px;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }

    .skill-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 12px 20px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(8px);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.2s;
      color: rgba(255,255,255,0.8);
      min-width: 90px;
    }

    .skill-btn .skill-icon {
      font-size: 1.6rem;
      line-height: 1;
    }

    .skill-btn:disabled {
      opacity: 0.25;
      cursor: not-allowed;
    }

    #skill-shuffle { border-color: rgba(96,165,250,0.4); }
    #skill-shuffle:not(:disabled):hover {
      background: rgba(96,165,250,0.15);
      border-color: rgba(96,165,250,0.7);
      box-shadow: 0 0 16px rgba(96,165,250,0.3);
      transform: translateY(-2px);
    }

    #skill-undo { border-color: rgba(167,139,250,0.4); }
    #skill-undo:not(:disabled):hover {
      background: rgba(167,139,250,0.15);
      border-color: rgba(167,139,250,0.7);
      box-shadow: 0 0 16px rgba(167,139,250,0.3);
      transform: translateY(-2px);
    }

    #skill-expand { border-color: rgba(251,191,36,0.4); }
    #skill-expand:not(:disabled):hover {
      background: rgba(251,191,36,0.12);
      border-color: rgba(251,191,36,0.7);
      box-shadow: 0 0 16px rgba(251,191,36,0.3);
      transform: translateY(-2px);
    }

    /* オーバーレイ */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }

    #overlay.show { display: flex; }

    #overlay-box {
      background: rgba(15,10,40,0.95);
      border: 1px solid rgba(167,139,250,0.35);
      border-radius: 24px;
      padding: 48px 56px;
      text-align: center;
      box-shadow: 0 0 60px rgba(99,51,153,0.5), 0 0 120px rgba(99,51,153,0.2);
    }

    #overlay-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.2rem;
      font-weight: 900;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #overlay-msg {
      color: rgba(255,255,255,0.6);
      font-size: 1rem;
      margin-bottom: 8px;
    }

    #overlay-btn {
      margin-top: 24px;
      padding: 14px 40px;
      border-radius: 12px;
      border: 1px solid rgba(167,139,250,0.5);
      background: linear-gradient(135deg, rgba(167,139,250,0.2), rgba(96,165,250,0.2));
      color: #fff;
      font-size: 1rem;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.2s;
    }

    #overlay-btn:hover {
      background: linear-gradient(135deg, rgba(167,139,250,0.4), rgba(96,165,250,0.4));
      box-shadow: 0 0 20px rgba(167,139,250,0.4);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>

<h1>PLANET PUZZLE</h1>

<div id="info-bar">
  残りタイル &nbsp;<span id="tile-count">0</span>
</div>

<div id="game-area"></div>

<div id="slot-area"></div>

<div id="skill-area">
  <button class="skill-btn" id="skill-shuffle">
    <span class="skill-icon">🔀</span>シャッフル
  </button>
  <button class="skill-btn" id="skill-undo">
    <span class="skill-icon">↩️</span>元に戻す
  </button>
  <button class="skill-btn" id="skill-expand">
    <span class="skill-icon">➕</span>スロット拡張
  </button>
</div>

<div id="overlay">
  <div id="overlay-box">
    <div id="overlay-title"></div>
    <div id="overlay-msg"></div>
    <button id="overlay-btn">もう一度</button>
  </div>
</div>

<script>
// ===== 定数 =====
// 惑星・天体テーマ（太陽系8惑星＋太陽＋月）
const TILE_TYPES = ['☀️','🌕','🌍','🪐','🔴','🔵','🟠','🟡','⚫','🟣'];
const TILE_COUNT_EACH = 27;  // 各タイル種類の枚数（3の倍数）→ 合計270枚
const GAME_W = 560, GAME_H = 560;
const TILE_SIZE = 60;
const BASE_SLOTS = 7;
const SLOT_EXPAND = 3;
const LAYERS = 9;             // 積み重ねレイヤー数
const CELL_SPACING = 50;      // セル間隔（タイル60px > 50px→隣接セルと少し重なる）
const GRID_COLS = 9;          // 配置グリッド列数
const GRID_ROWS = 9;          // 配置グリッド行数
const JITTER = 2;             // グリッド位置からのランダムずれ（px）

// ===== 状態 =====
let tiles = [];         // { id, type, x, y, layer, elem, blocked }
let slots = [];         // スロットに入ったタイル種類の配列
let extraSlots = 0;     // スロット拡張数
let history = [];       // アンドゥ用スタック [{tiles, slots}]
let gameOver = false;

// ===== 初期化 =====
function init() {
  tiles = [];
  slots = [];
  extraSlots = 0;
  history = [];
  gameOver = false;

  document.getElementById('game-area').innerHTML = '';
  document.getElementById('skill-shuffle').disabled = false;
  document.getElementById('skill-undo').disabled = true;
  document.getElementById('skill-expand').disabled = false;

  generateTiles();
  updateBlockedState();
  renderSlots();
  updateTileCount();
}

// ===== タイル生成 =====
function generateTiles() {
  const gameArea = document.getElementById('game-area');

  // タイルの種類プール（各TILE_COUNT_EACH枚）
  let pool = [];
  TILE_TYPES.forEach((t, i) => {
    for (let k = 0; k < TILE_COUNT_EACH; k++) pool.push({ type: i });
  });
  shuffle(pool);

  // セル間がタイルより狭いため隣接タイルが少し重なり、相互ブロックが発生する
  const gridW = GRID_COLS * CELL_SPACING;
  const gridH = GRID_ROWS * CELL_SPACING;
  const marginX = Math.floor((GAME_W - gridW) / 2);
  const marginY = Math.floor((GAME_H - gridH) / 2);
  const cellCount = GRID_COLS * GRID_ROWS;
  let id = 0;

  // セル座標配列を作ってシャッフルし、各タイルに割り当てる
  const cellAssignments = [];
  for (let i = 0; i < pool.length; i++) {
    cellAssignments.push(i % cellCount);
  }
  shuffle(cellAssignments);

  pool.forEach((p, idx) => {
    const layer = Math.floor(idx / (pool.length / LAYERS));
    const cellIdx = cellAssignments[idx];
    const col = cellIdx % GRID_COLS;
    const row = Math.floor(cellIdx / GRID_COLS);
    const baseX = marginX + col * CELL_SPACING;
    const baseY = marginY + row * CELL_SPACING;
    const x = Math.max(0, Math.min(GAME_W - TILE_SIZE, baseX + randInt(-JITTER, JITTER)));
    const y = Math.max(0, Math.min(GAME_H - TILE_SIZE, baseY + randInt(-JITTER, JITTER)));
    const zIndex = 10 + layer * 30 + randInt(0, 10);

    const elem = document.createElement('div');
    elem.className = `tile tile-${p.type}`;
    elem.style.left = x + 'px';
    elem.style.top  = y + 'px';
    elem.style.zIndex = zIndex;
    elem.textContent = TILE_TYPES[p.type];
    elem.dataset.id = id;

    const tile = { id, type: p.type, x, y, layer, zIndex, elem, blocked: false };
    tiles.push(tile);
    elem.addEventListener('click', () => onTileClick(tile.id));
    gameArea.appendChild(elem);
    id++;
  });
}

// ===== ブロック状態更新 =====
// あるタイルの上に（zIndexが大きく、座標が重なる）別のタイルがあればブロック
function updateBlockedState() {
  tiles.forEach(t => {
    t.blocked = tiles.some(other => {
      if (other.id === t.id) return false;
      if (other.zIndex <= t.zIndex) return false;
      return rectsOverlap(t, other);
    });
    t.elem.classList.toggle('blocked', t.blocked);
  });
}

function rectsOverlap(a, b) {
  const margin = 3; // 隣接セル（50px間隔）の5px重なりも検出
  return (
    a.x < b.x + TILE_SIZE - margin &&
    a.x + TILE_SIZE - margin > b.x &&
    a.y < b.y + TILE_SIZE - margin &&
    a.y + TILE_SIZE - margin > b.y
  );
}

// ===== タイルクリック =====
function onTileClick(id) {
  if (gameOver) return;
  const tile = tiles.find(t => t.id === id);
  if (!tile || tile.blocked) return;

  const totalSlots = BASE_SLOTS + extraSlots;
  if (slots.length >= totalSlots) return;

  // アンドゥ用スナップショット
  saveHistory();

  // スロットに追加
  slots.push(tile.type);

  // タイルをゲームエリアから除去
  tile.elem.remove();
  tiles = tiles.filter(t => t.id !== id);

  updateBlockedState();

  // 同じ種類が3つ揃ったか確認
  checkMatch();

  renderSlots();
  updateTileCount();
  checkGameState();
}

// ===== マッチチェック =====
function checkMatch() {
  TILE_TYPES.forEach((_, type) => {
    const count = slots.filter(s => s === type).length;
    if (count >= 3) {
      // 3つ消す
      let removed = 0;
      slots = slots.filter(s => {
        if (s === type && removed < 3) { removed++; return false; }
        return true;
      });
    }
  });
}

// ===== スロット描画 =====
function renderSlots() {
  const area = document.getElementById('slot-area');
  area.innerHTML = '';
  const totalSlots = BASE_SLOTS + extraSlots;

  for (let i = 0; i < totalSlots; i++) {
    const div = document.createElement('div');
    div.className = 'slot';
    if (i >= BASE_SLOTS) div.classList.add('extra');
    if (slots[i] !== undefined) {
      div.classList.add('filled');
      div.style.background = getTileColor(slots[i]);
      div.style.border = '2px solid rgba(255,255,255,0.4)';
      div.textContent = TILE_TYPES[slots[i]];
    }
    area.appendChild(div);
  }
}

function getTileColor(type) {
  const colors = ['#fde8e8','#fdebd0','#fef9e7','#e8f8f0','#e8f6f3','#e8f4fc','#f3eaf9','#fde8f1','#e8f7fa','#f0f8e8'];
  return colors[type] || '#f5f5f5';
}

// ===== タイル残数更新 =====
function updateTileCount() {
  document.getElementById('tile-count').textContent = tiles.length;
}

// ===== ゲーム状態チェック =====
function checkGameState() {
  if (tiles.length === 0) {
    showOverlay('🎉 クリア！', 'すべてのタイルを消しました！');
    gameOver = true;
    return;
  }
  const totalSlots = BASE_SLOTS + extraSlots;
  if (slots.length >= totalSlots) {
    showOverlay('💀 ゲームオーバー', 'スロットがいっぱいになりました。');
    gameOver = true;
  }
}

// ===== スキル =====
document.getElementById('skill-shuffle').addEventListener('click', () => {
  if (gameOver) return;
  saveHistory();
  shuffleTilePositions();
  updateBlockedState();
});

document.getElementById('skill-undo').addEventListener('click', () => {
  if (gameOver || history.length === 0) return;
  restoreHistory();
});

document.getElementById('skill-expand').addEventListener('click', () => {
  if (gameOver) return;
  extraSlots += SLOT_EXPAND;
  document.getElementById('skill-expand').disabled = true;
  renderSlots();
});

function shuffleTilePositions() {
  const gameArea = document.getElementById('game-area');
  tiles.forEach(tile => {
    const x = randInt(0, GAME_W - TILE_SIZE);
    const y = randInt(0, GAME_H - TILE_SIZE);
    tile.x = x;
    tile.y = y;
    tile.elem.style.left = x + 'px';
    tile.elem.style.top  = y + 'px';
  });
}

// ===== アンドゥ =====
function saveHistory() {
  history.push({
    tiles: tiles.map(t => ({ ...t })),
    slots: [...slots],
    extraSlots
  });
  document.getElementById('skill-undo').disabled = false;
}

function restoreHistory() {
  if (history.length === 0) return;
  const snap = history.pop();

  // 現在のタイルDOM削除
  tiles.forEach(t => t.elem.remove());

  const gameArea = document.getElementById('game-area');

  tiles = snap.tiles.map(st => {
    // DOM再生成
    const elem = document.createElement('div');
    elem.className = `tile tile-${st.type}`;
    elem.style.left = st.x + 'px';
    elem.style.top  = st.y + 'px';
    elem.style.zIndex = st.zIndex;
    elem.textContent = TILE_TYPES[st.type];
    elem.dataset.id = st.id;
    const tile = { ...st, elem };
    elem.addEventListener('click', () => onTileClick(tile.id));
    gameArea.appendChild(elem);
    return tile;
  });

  slots = snap.slots;
  extraSlots = snap.extraSlots;

  updateBlockedState();
  renderSlots();
  updateTileCount();

  if (history.length === 0) {
    document.getElementById('skill-undo').disabled = true;
  }
}

// ===== オーバーレイ =====
function showOverlay(title, msg) {
  document.getElementById('overlay-title').textContent = title;
  document.getElementById('overlay-msg').textContent = msg;
  document.getElementById('overlay').classList.add('show');
}

document.getElementById('overlay-btn').addEventListener('click', () => {
  document.getElementById('overlay').classList.remove('show');
  init();
});

// ===== ユーティリティ =====
function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = randInt(0, i);
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ===== スタート =====
init();
</script>
</body>
</html>
