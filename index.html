<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Planet Puzzle">
  <meta name="theme-color" content="#a78bfa">
  <link rel="manifest" href="manifest.json">
  <title>PLANET PUZZLE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a1a;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(99,51,153,0.25) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(20,80,160,0.25) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 10%, rgba(180,60,100,0.15) 0%, transparent 40%);
      color: #fff;
      font-family: 'Noto Sans JP', sans-serif;
      display: block;
      min-height: 100vh;
    }

    /* 星背景 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 45%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 25%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 75% 55%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 10%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 20% 80%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 70%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 35%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(2px 2px at 65% 90%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 5% 60%, rgba(255,255,255,0.5) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ========== タイトル画面 ========== */
    #title-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 5000;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    #title-screen.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(1.04);
    }

    /* 惑星アニメーション */
    .planet-orbit {
      position: relative;
      width: min(320px, 80vw);
      height: min(320px, 80vw);
      margin-bottom: 32px;
    }

    .planet-main {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: min(9rem, 22vw);
      animation: planet-float 4s ease-in-out infinite;
      filter: drop-shadow(0 0 40px rgba(167,139,250,0.8));
    }

    @keyframes planet-float {
      0%, 100% { transform: translateY(0px) rotate(-3deg); }
      50%       { transform: translateY(-18px) rotate(3deg); }
    }

    .orbit-ring {
      position: absolute;
      inset: 10%;
      border-radius: 50%;
      border: 1px solid rgba(167,139,250,0.2);
      animation: orbit-spin 8s linear infinite;
    }

    .orbit-ring::after {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      background: radial-gradient(circle, #60a5fa, #3b82f6);
      border-radius: 50%;
      top: -6px;
      left: calc(50% - 6px);
      box-shadow: 0 0 10px #60a5fa;
    }

    @keyframes orbit-spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .orbit-ring-2 {
      position: absolute;
      inset: 25%;
      border-radius: 50%;
      border: 1px solid rgba(244,114,182,0.2);
      animation: orbit-spin 5s linear infinite reverse;
    }

    .orbit-ring-2::after {
      content: '';
      position: absolute;
      width: 9px;
      height: 9px;
      background: radial-gradient(circle, #f472b6, #ec4899);
      border-radius: 50%;
      bottom: -4px;
      left: calc(50% - 4px);
      box-shadow: 0 0 8px #f472b6;
    }

    #title-logo {
      font-family: 'Orbitron', sans-serif;
      font-size: min(3rem, 10vw);
      font-weight: 900;
      letter-spacing: 6px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      margin-bottom: 8px;
      filter: drop-shadow(0 0 20px rgba(167,139,250,0.5));
    }

    #title-sub {
      font-size: 0.85rem;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      margin-bottom: 48px;
    }

    #start-btn {
      position: relative;
      padding: 18px 56px;
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 3px;
      color: #fff;
      background: transparent;
      border: 1.5px solid rgba(167,139,250,0.6);
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s;
      overflow: hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    #start-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(167,139,250,0.15), rgba(96,165,250,0.15));
      opacity: 0;
      transition: opacity 0.3s;
    }

    #start-btn:hover::before, #start-btn:active::before { opacity: 1; }

    #start-btn:hover {
      border-color: rgba(167,139,250,1);
      box-shadow: 0 0 30px rgba(167,139,250,0.5), inset 0 0 20px rgba(167,139,250,0.1);
      transform: translateY(-2px);
    }

    /* 流れ星 */
    .shooting-star {
      position: fixed;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      pointer-events: none;
      animation: shoot linear forwards;
    }

    @keyframes shoot {
      0%   { transform: translate(0, 0) scaleX(1); opacity: 1; }
      100% { transform: translate(200px, 200px) scaleX(40); opacity: 0; }
    }

    /* 戦闘機 */
    .ship-wrap {
      position: fixed;
      left: 0;
      top: 0;
      pointer-events: none;
      filter: drop-shadow(0 0 5px rgba(140,210,255,0.45));
      transform-origin: 50% 50%;
    }

    /* ゲーム画面 */
    #game-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      width: 100%;
      min-height: 100vh;
      padding: 20px 16px max(24px, env(safe-area-inset-bottom, 24px));
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.5s ease 0.3s, transform 0.5s ease 0.3s;
      pointer-events: none;
    }

    #game-screen.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: 4px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
      position: relative;
      z-index: 1;
    }

    #info-bar {
      display: flex;
      gap: 24px;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.45);
      margin-bottom: 14px;
      letter-spacing: 1px;
      position: relative;
      z-index: 1;
    }

    #info-bar span {
      color: #a78bfa;
      font-weight: 700;
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
    }

    /* ゲームエリアラッパ（レスポンシブ高さ調整） */
    #game-wrapper {
      position: relative;
      width: min(560px, calc(100vw - 32px));
      z-index: 1;
      margin-bottom: 16px;
    }

    /* ゲームエリア */
    #game-area {
      position: relative;
      width: 560px;
      height: 700px;
      background: rgba(255,255,255,0.03);
      border-radius: 20px;
      border: 1px solid rgba(167,139,250,0.25);
      overflow: hidden;
      box-shadow:
        0 0 40px rgba(99,51,153,0.3),
        inset 0 0 60px rgba(0,0,0,0.4);
      transform-origin: top left;
    }

    /* タイル */
    .tile {
      position: absolute;
      width: 70px;
      height: 70px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.2rem;
      line-height: 1;
      cursor: pointer;
      user-select: none;
      border: 1.5px solid rgba(255,255,255,0.35);
      transition: transform 0.12s, box-shadow 0.12s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.4);
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .tile:hover:not(.blocked) {
      transform: scale(1.1) translateY(-2px);
      box-shadow: 0 6px 20px rgba(167,139,250,0.5), inset 0 1px 0 rgba(255,255,255,0.5);
      z-index: 9999 !important;
    }

    .tile.blocked {
      cursor: not-allowed;
      filter: brightness(0.45) saturate(0.5);
    }

    /* ===== 惑星タイル個別スタイル ===== */
    /* 0:☀️太陽 - 燃えるオレンジ〜黄 */
    .tile-0 {
      background: linear-gradient(145deg, #fff7e0, #ffe066);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.6), 0 0 12px rgba(255,200,0,0.4);
      border-color: rgba(255,210,50,0.5);
    }
    /* 1:🌕月 - クレーター灰 */
    .tile-1 {
      background: linear-gradient(145deg, #e8e8e8, #b0b0b0);
      box-shadow: 0 2px 8px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.5);
      border-color: rgba(160,160,160,0.5);
    }
    /* 2:🌍地球 - 青緑 */
    .tile-2 {
      background: linear-gradient(145deg, #e0f4ff, #b3e8cc);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.5), 0 0 10px rgba(50,200,150,0.25);
      border-color: rgba(80,200,160,0.4);
    }
    /* 3:🪐土星 - 淡いゴールドリング */
    .tile-3 {
      background: linear-gradient(145deg, #fdf6e0, #f5dfa0);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.5), 0 0 10px rgba(220,180,80,0.3);
      border-color: rgba(210,170,70,0.5);
    }
    /* 4:🔴火星 - 赤茶 */
    .tile-4 {
      background: linear-gradient(145deg, #ffe8e0, #f5b0a0);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.5), 0 0 10px rgba(220,80,60,0.25);
      border-color: rgba(220,100,80,0.4);
    }
    /* 5:🔵海王星 - 深めの青 */
    .tile-5 {
      background: linear-gradient(145deg, #e0eeff, #a0c4f5);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.5), 0 0 10px rgba(60,120,240,0.25);
      border-color: rgba(80,140,230,0.4);
    }
    /* 6:🟠木星 - オレンジ縞模様風 */
    .tile-6 {
      background: repeating-linear-gradient(160deg, #fde8c8 0px, #fde8c8 6px, #f5caa0 6px, #f5caa0 12px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.4);
      border-color: rgba(210,150,80,0.4);
    }
    /* 7:🟡金星 - 淡い黄 */
    .tile-7 {
      background: linear-gradient(145deg, #fffbe0, #f5e890);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.6), 0 0 10px rgba(240,220,50,0.3);
      border-color: rgba(220,200,60,0.4);
    }
    /* 8:⚫水星 - 暗いグレー */
    .tile-8 {
      background: linear-gradient(145deg, #e8e8e8, #c0c0c0);
      box-shadow: 0 2px 8px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.3);
      border-color: rgba(160,160,160,0.4);
    }
    /* 9:🟣天王星 - 青みがかった紫 */
    .tile-9 {
      background: linear-gradient(145deg, #f0eaff, #c8b0f0);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.5), 0 0 10px rgba(160,100,240,0.25);
      border-color: rgba(160,120,230,0.4);
    }
    /* 10:⭐星 - 輝く黄金 */
    .tile-10 {
      background: linear-gradient(145deg, #fffbe0, #ffd700);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.7), 0 0 14px rgba(255,200,0,0.5);
      border-color: rgba(255,180,0,0.6);
    }
    /* 11:☄️彗星 - 赤オレンジ */
    .tile-11 {
      background: linear-gradient(145deg, #ffe0cc, #e8603c);
      box-shadow: 0 2px 8px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.4), 0 0 12px rgba(230,80,40,0.35);
      border-color: rgba(220,80,40,0.5);
    }
    /* 12:🌙三日月 - クリームイエロー */
    .tile-12 {
      background: linear-gradient(145deg, #fffde8, #f0e080);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.6), 0 0 10px rgba(230,210,60,0.3);
      border-color: rgba(210,190,50,0.5);
    }
    /* 13:🛸UFO - ティールグリーン */
    .tile-13 {
      background: linear-gradient(145deg, #e0fff8, #60d0c0);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.5), 0 0 12px rgba(60,200,180,0.35);
      border-color: rgba(40,180,160,0.5);
    }
    /* 14:💫流れ星 - ライトラベンダー */
    .tile-14 {
      background: linear-gradient(145deg, #f8f0ff, #d8c0ff);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.6), 0 0 10px rgba(180,140,255,0.3);
      border-color: rgba(160,120,240,0.4);
    }

    /* スロットエリア */
    #slot-area {
      display: flex;
      gap: 6px;
      width: min(560px, calc(100vw - 32px));
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      border: 1px solid rgba(167,139,250,0.2);
      padding: 12px 16px;
      margin-bottom: 16px;
      min-height: 88px;
      align-items: center;
      overflow-x: auto;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
      position: relative;
      z-index: 1;
    }

    .slot {
      width: var(--slot-size, 58px);
      height: var(--slot-size, 58px);
      min-width: var(--slot-size, 58px);
      border-radius: 12px;
      border: 1.5px dashed rgba(255,255,255,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: calc(var(--slot-size, 58px) * 0.55);
      transition: all 0.2s;
      background: rgba(255,255,255,0.04);
    }

    .slot.filled {
      border-style: solid;
      border-color: rgba(255,255,255,0.3);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.3);
    }

    /* スキルエリア */
    #skill-area {
      display: flex;
      gap: 16px;
      width: min(560px, calc(100vw - 32px));
      justify-content: center;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }

    .skill-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 12px 20px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(8px);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.2s;
      color: rgba(255,255,255,0.8);
      min-width: min(90px, calc((100vw - 96px) / 3));
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .skill-btn .skill-icon {
      font-size: 1.6rem;
      line-height: 1;
    }

    .skill-btn:disabled {
      opacity: 0.25;
      cursor: not-allowed;
    }

    #skill-shuffle { border-color: rgba(96,165,250,0.4); white-space: nowrap; }
    #skill-shuffle:not(:disabled):hover {
      background: rgba(96,165,250,0.15);
      border-color: rgba(96,165,250,0.7);
      box-shadow: 0 0 16px rgba(96,165,250,0.3);
      transform: translateY(-2px);
    }

    #skill-undo { border-color: rgba(167,139,250,0.4); }
    #skill-undo:not(:disabled):hover {
      background: rgba(167,139,250,0.15);
      border-color: rgba(167,139,250,0.7);
      box-shadow: 0 0 16px rgba(167,139,250,0.3);
      transform: translateY(-2px);
    }

    /* オーバーレイ */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }

    #overlay.show { display: flex; }

    #overlay-box {
      background: rgba(15,10,40,0.95);
      border: 1px solid rgba(167,139,250,0.35);
      border-radius: 24px;
      padding: 48px 56px;
      text-align: center;
      box-shadow: 0 0 60px rgba(99,51,153,0.5), 0 0 120px rgba(99,51,153,0.2);
    }

    #overlay-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.2rem;
      font-weight: 900;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #overlay-msg {
      color: rgba(255,255,255,0.6);
      font-size: 1rem;
      margin-bottom: 8px;
    }

    #overlay-btn {
      margin-top: 24px;
      padding: 14px 40px;
      border-radius: 12px;
      border: 1px solid rgba(167,139,250,0.5);
      background: linear-gradient(135deg, rgba(167,139,250,0.2), rgba(96,165,250,0.2));
      color: #fff;
      font-size: 1rem;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.2s;
    }

    #overlay-btn:hover {
      background: linear-gradient(135deg, rgba(167,139,250,0.4), rgba(96,165,250,0.4));
      box-shadow: 0 0 20px rgba(167,139,250,0.4);
      transform: translateY(-1px);
    }

    /* ===== クリア専用オーバーレイ ===== */
    #clear-overlay {
      display: none;
      position: fixed;
      inset: 0;
      align-items: center;
      justify-content: center;
      z-index: 10001;
      pointer-events: none;
    }
    #clear-overlay.show {
      display: flex;
      pointer-events: auto;
    }
    #clear-box {
      background: rgba(10,5,30,0.92);
      border: 1px solid rgba(167,139,250,0.5);
      border-radius: 28px;
      padding: 52px 60px;
      text-align: center;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 80px rgba(167,139,250,0.6), 0 0 160px rgba(96,165,250,0.3);
      animation: clear-box-in 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes clear-box-in {
      from { transform: scale(0.5) rotate(-4deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    #clear-box::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 28px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa, #f472b6, #a78bfa);
      background-size: 300% 300%;
      animation: border-flow 2.5s linear infinite;
      z-index: -1;
    }
    @keyframes border-flow {
      0%   { background-position: 0% 50%; }
      100% { background-position: 300% 50%; }
    }
    #clear-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.4rem;
      font-weight: 900;
      background: linear-gradient(135deg, #fbbf24, #f472b6, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      animation: clear-title-pop 0.5s 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes clear-title-pop {
      from { transform: scale(0.3); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    #clear-planet {
      font-size: 4rem;
      display: block;
      margin-bottom: 8px;
      animation: clear-planet-spin 1s 0.2s ease-out both;
    }

<script>
// ===== サウンドエンジン（Web Audio API） =====
const SFX = (() => {
  let ctx = null;
  const getCtx = () => {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    return ctx;
  };

  // 基本ヘルパー：オシレーター＋エンベロープ
  const osc = (freq, type, start, dur, gainPeak, ac) => {
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.setValueAtTime(0, start);
    g.gain.linearRampToValueAtTime(gainPeak, start + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
    o.connect(g); g.connect(ac.destination);
    o.start(start); o.stop(start + dur);
  };

  return {
    // 1. タップ音：軽いポップ
    tap() {
      try {
        const ac = getCtx();
        const t = ac.currentTime;
        osc(880, 'sine',     t,      0.08, 0.25, ac);
        osc(1320, 'sine',    t+0.01, 0.06, 0.12, ac);
      } catch(e) {}
    },

    // 2. マッチ消去音：明るいコード上昇
    match() {
      try {
        const ac = getCtx();
        const t = ac.currentTime;
        [523, 659, 784, 1047].forEach((f, i) => {
          osc(f, 'sine', t + i * 0.06, 0.35, 0.3, ac);
        });
      } catch(e) {}
    },

    // 3. ゲームオーバー音：不協和音で下降
    gameover() {
      try {
        const ac = getCtx();
        const t = ac.currentTime;
        osc(440, 'sawtooth', t,      0.5,  0.3, ac);
        osc(415, 'sawtooth', t+0.1,  0.5,  0.25, ac);
        osc(330, 'sawtooth', t+0.3,  0.8,  0.3, ac);
        osc(220, 'sawtooth', t+0.6,  1.0,  0.25, ac);
      } catch(e) {}
    },

    // 4. クリア音：ファンファーレ風アルペジオ
    clear() {
      try {
        const ac = getCtx();
        const t = ac.currentTime;
        const melody = [523, 659, 784, 1047, 1319];
        melody.forEach((f, i) => {
          osc(f,     'sine',     t + i * 0.1, 0.6, 0.3, ac);
          osc(f * 2, 'sine',     t + i * 0.1, 0.4, 0.1, ac);
        });
        // 最後に和音
        [523, 659, 784].forEach(f => {
          osc(f, 'sine', t + 0.6, 0.8, 0.25, ac);
        });
      } catch(e) {}
    },

    // 5. タイトルBGM：重厚な宇宙ドローン＋コードパッド＋アルペジオ
    bgmStart() {
      try {
        const ac = getCtx();
        if (ac.state === 'suspended') ac.resume();
        this._bgmNodes = [];

        // ===== マスターゲイン（フェードイン用） =====
        const master = ac.createGain();
        master.gain.setValueAtTime(0, ac.currentTime);
        master.gain.linearRampToValueAtTime(0.55, ac.currentTime + 3.0);
        master.connect(ac.destination);
        this._bgmMaster = master;

        // ===== ベースドローン：低音うねり =====
        const makeDrone = (freq, detune, vol) => {
          const o = ac.createOscillator();
          const g = ac.createGain();
          // LFO で音量をゆっくり揺らす
          const lfo = ac.createOscillator();
          const lfoGain = ac.createGain();
          lfo.frequency.value = 0.18;
          lfoGain.gain.value = vol * 0.35;
          lfo.connect(lfoGain);
          lfoGain.connect(g.gain);
          g.gain.value = vol;
          o.type = 'sine';
          o.frequency.value = freq;
          o.detune.value = detune;
          o.connect(g); g.connect(master);
          lfo.start(); o.start();
          this._bgmNodes.push(o, lfo);
        };
        makeDrone(55,   0,  0.5);  // A1 ベース
        makeDrone(55,   6,  0.3);  // わずかデチューン
        makeDrone(82.5, 0,  0.25); // E2 5th
        makeDrone(110,  0,  0.2);  // A2 オクターブ上

        // ===== コードパッド：厚みのある和音 =====
        // Amマイナー系: A-C-E-G (110, 131, 165, 196 Hz)
        const chordFreqs = [110, 130.8, 164.8, 196, 261.6];
        chordFreqs.forEach((f, i) => {
          [-8, 0, 8].forEach(det => {
            const o = ac.createOscillator();
            const g = ac.createGain();
            o.type = i % 2 === 0 ? 'sine' : 'triangle';
            o.frequency.value = f;
            o.detune.value = det;
            g.gain.value = 0.06;
            o.connect(g); g.connect(master);
            o.start();
            this._bgmNodes.push(o);
          });
        });

        // ===== アルペジオ：ゆっくり上昇する音列 =====
        const arpNotes = [110, 165, 220, 261.6, 330, 440, 523, 440, 330, 261.6, 220, 165];
        const arpInterval = 1.1; // 秒
        let arpIdx = 0;
        const scheduleArp = () => {
          if (!this._bgmActive) return;
          try {
            const ac2 = getCtx();
            const t = ac2.currentTime;
            const freq = arpNotes[arpIdx % arpNotes.length];
            const o = ac2.createOscillator();
            const g = ac2.createGain();
            o.type = 'sine';
            o.frequency.value = freq;
            g.gain.setValueAtTime(0, t);
            g.gain.linearRampToValueAtTime(0.12, t + 0.05);
            g.gain.exponentialRampToValueAtTime(0.0001, t + 0.7);
            o.connect(g); g.connect(master);
            o.start(t); o.stop(t + 0.8);
            arpIdx++;
          } catch(e) {}
          this._bgmArpTimer = setTimeout(scheduleArp, arpInterval * 1000);
        };
        this._bgmActive = true;
        scheduleArp();

      } catch(e) {}
    },

    // 5b. ゲーム中BGM：攻略感のある重厉な宇宙BGM
    bgmGame() {
      try {
        const ac = getCtx();
        if (ac.state === 'suspended') ac.resume();
        this._bgmNodes = [];
        this._bgmActive = true;

        // マスターゲイン（フェードイン）
        const master = ac.createGain();
        master.gain.setValueAtTime(0, ac.currentTime);
        master.gain.linearRampToValueAtTime(0.5, ac.currentTime + 2.0);
        master.connect(ac.destination);
        this._bgmMaster = master;

        // ベースドローン（タイトルと同系統、少しリズミカルに）
        const makeDrone = (freq, detune, vol) => {
          const o = ac.createOscillator();
          const g = ac.createGain();
          const lfo = ac.createOscillator();
          const lfoGain = ac.createGain();
          lfo.frequency.value = 0.28;
          lfoGain.gain.value = vol * 0.28;
          lfo.connect(lfoGain);
          lfoGain.connect(g.gain);
          g.gain.value = vol;
          o.type = 'sine';
          o.frequency.value = freq;
          o.detune.value = detune;
          o.connect(g); g.connect(master);
          lfo.start(); o.start();
          this._bgmNodes.push(o, lfo);
        };
        makeDrone(55,   0,  0.55);
        makeDrone(55,   7,  0.28);
        makeDrone(82.5, 0,  0.28);
        makeDrone(110,  0,  0.20);

        // リズムパルス（低音キック風、毎0.5秒）
        const scheduleKick = () => {
          if (!this._bgmActive) return;
          try {
            const ac2 = getCtx();
            const t = ac2.currentTime;
            const o = ac2.createOscillator();
            const g = ac2.createGain();
            o.type = 'sine';
            o.frequency.setValueAtTime(110, t);
            o.frequency.exponentialRampToValueAtTime(38, t + 0.14);
            g.gain.setValueAtTime(0.42, t);
            g.gain.exponentialRampToValueAtTime(0.0001, t + 0.18);
            o.connect(g); g.connect(master);
            o.start(t); o.stop(t + 0.22);
          } catch(e) {}
          this._bgmKickTimer = setTimeout(scheduleKick, 500);
        };
        scheduleKick();

      } catch(e) {}
    },

    bgmStop(fadeTime = 1.5) {
      try {
        this._bgmActive = false;
        clearTimeout(this._bgmArpTimer);
        clearTimeout(this._bgmKickTimer);
        if (this._bgmMaster) {
          const ac = getCtx();
          // 現時点のノードとマスターをローカルにキャプチャしてから即クリア。
          // こうすることで bgmGame() が直後に呼ばれても新ノードを誤ってStopしない。
          const nodesToStop = this._bgmNodes || [];
          const masterToFade = this._bgmMaster;
          this._bgmNodes = [];
          this._bgmMaster = null;
          masterToFade.gain.setValueAtTime(masterToFade.gain.value, ac.currentTime);
          masterToFade.gain.linearRampToValueAtTime(0, ac.currentTime + fadeTime);
          setTimeout(() => {
            nodesToStop.forEach(n => { try { n.stop(); } catch(e) {} });
          }, (fadeTime + 0.1) * 1000);
        }
      } catch(e) {}
    }
  };
})();


// 惑星・天体テーマ（太陽系8惑星＋太陽＋月）
const TILE_TYPES = ['☀️','🌕','🌍','🪐','🔴','🔵','🟠','🟡','⚫','🟣','⭐','☄️','🌙','🛸','💫'];
const TILE_COUNT_EACH = 27;  // 各タイル種類の枚数（3の倍数）→ 合計405枚
const GAME_W = 560, GAME_H = 700;
const TILE_SIZE = 70;
const BASE_SLOTS = 7;
const LAYERS = 7;             // 積み重ねレイヤー数（Mahjong式7層）
const CELL_SPACING = 70;      // 使用しない（TILE_SIZEと同値）
const GRID_COLS = 7;          // 各層の列数
const GRID_ROWS = 9;          // 各層の行数（縦スペースを活用）
const JITTER = 0;             // グリッド配置なのでずれなし

// ===== 状態 =====
let tiles = [];         // { id, type, x, y, layer, elem, blocked }
let slots = [];         // スロットに入ったタイル種類の配列
let slotTypeOrder = []; // 各タイプの初登場順
let shuffleRemain = 3;  // シャッフル残り回数
let undoRemain = 3;     // 元に戻す残り回数
let history = [];       // アンドゥ用スタック [{tiles, slots}]
let gameOver = false;
let isAnimating = false;
let totalTiles = 0;     // ゲーム開始時の総タイル数

// ===== 初期化 =====
function init() {
  tiles = [];
  slots = [];
  slotTypeOrder = [];
  history = [];
  gameOver = false;
  isAnimating = false;

  document.getElementById('game-area').innerHTML = '';
  shuffleRemain = 3;
  updateShuffleBtn();
  undoRemain = 3;
  updateUndoBtn();

  generateTiles();
  totalTiles = tiles.length + 0; // パイルを含む全タイル数を記録（generateTiles後）
  updateBlockedState();
  renderSlots();
  updateTileCount();
  SFX.bgmGame(); // ゲーム中BGM開始
}

// ===== タイル生成 =====
function generateTiles() {
  const gameArea = document.getElementById('game-area');

  // タイルの種類プール（各TILE_COUNT_EACH枚）
  let pool = [];
  TILE_TYPES.forEach((t, i) => {
    for (let k = 0; k < TILE_COUNT_EACH; k++) pool.push({ type: i });
  });
  shuffle(pool);

  let id = 0;

  // ===== パイル（深積み）生成 =====
  const PILE_EACH = 12;
  const PILE_STEP = 12;
  // パイルはゲームエリア左端固定
  const pileBaseX = 15;
  [150, 430].forEach((baseY) => {
    for (let d = 0; d < PILE_EACH; d++) {
      const p = pool.shift();
      const tileY = baseY + d * PILE_STEP;
      const zIndex = 2000 - d * 5;
      const elem = document.createElement('div');
      elem.className = `tile tile-${p.type}`;
      elem.style.left   = pileBaseX + 'px';
      elem.style.top    = tileY + 'px';
      elem.style.zIndex = zIndex;
      elem.textContent  = TILE_TYPES[p.type];
      elem.dataset.id   = id;
      const tile = { id, type: p.type, x: pileBaseX, y: tileY, layer: 20, zIndex, elem, blocked: false };
      tiles.push(tile);
      elem.addEventListener('click', () => onTileClick(tile.id));
      gameArea.appendChild(elem);
      id++;
    }
  });

  // ===== 通常タイル生成（Mahjong式3層積み） =====
  // 【構造】
  //   各層は GRID_COLS×GRID_ROWS の独立グリッド（同層内は絶対に重ならない）
  //   偶数層(0,2): オフセット(0, 0)
  //   奇数層(1)  : オフセット(TILE_SIZE/2, TILE_SIZE/2) = (35, 35px)
  //   → 上層の1タイルが下層の最大4タイルに跨がる
  //   → 1枚取り除くと真下の最大4枚が露出する
  const HALF = Math.floor(TILE_SIZE / 2); // 35px
  // GRID_COLS=7, GAME_W=560 → (560-7*70)/2 = 35px
  // GRID_ROWS=9, GAME_H=700 → (700-9*70)/2 = 35px
  const baseStartX = Math.round((GAME_W - GRID_COLS * TILE_SIZE) / 2);
  const baseStartY = Math.round((GAME_H - GRID_ROWS * TILE_SIZE) / 2);
  const tilesPerLayer = Math.floor(pool.length / LAYERS); // 381/7 = 54

  for (let layer = 0; layer < LAYERS; layer++) {
    // 偶数層はオフセット0、奇数層は半タイルずらす
    const ox = (layer % 2) * HALF;
    const oy = (layer % 2) * HALF;
    const startX = baseStartX + ox;
    const startY = baseStartY + oy;

    // この層の全セル（GRID_COLS×GRID_ROWS = 42セル）をシャッフル
    const cells = [];
    for (let r = 0; r < GRID_ROWS; r++) {
      for (let c = 0; c < GRID_COLS; c++) {
        cells.push({ c, r });
      }
    }
    shuffle(cells);

    // この層のタイル数（最終層は余り全部）
    const count = (layer < LAYERS - 1) ? tilesPerLayer : pool.length;

    for (let i = 0; i < count && i < cells.length && pool.length > 0; i++) {
      const p = pool.shift();
      const { c, r } = cells[i];
      const x = startX + c * TILE_SIZE;
      const y = startY + r * TILE_SIZE;
      // 層ごとに明確にzIndexを分離（層間の差を大きくとる）
      const zIndex = 100 + layer * 300;

      const elem = document.createElement('div');
      elem.className = `tile tile-${p.type}`;
      elem.style.left   = x + 'px';
      elem.style.top    = y + 'px';
      elem.style.zIndex = zIndex;
      elem.textContent  = TILE_TYPES[p.type];
      elem.dataset.id   = id;

      const tile = { id, type: p.type, x, y, layer, zIndex, elem, blocked: false };
      tiles.push(tile);
      elem.addEventListener('click', () => onTileClick(tile.id));
      gameArea.appendChild(elem);
      id++;
    }
  }
}

// ===== ブロック状態更新 =====
// あるタイルの上に（zIndexが大きく、座標が重なる）別のタイルがあればブロック
function updateBlockedState() {
  tiles.forEach(t => {
    t.blocked = tiles.some(other => {
      if (other.id === t.id) return false;
      // zIndexが低ければブロックしない。同じzIndexの場合はid大（DOM後方）が視覚的に上
      if (other.zIndex < t.zIndex) return false;
      if (other.zIndex === t.zIndex && other.id <= t.id) return false;
      return rectsOverlap(t, other);
    });
    t.elem.classList.toggle('blocked', t.blocked);
  });
}

function rectsOverlap(a, b) {
  const margin = 3; // 隣接セル（50px間隔）の5px重なりも検出
  return (
    a.x < b.x + TILE_SIZE - margin &&
    a.x + TILE_SIZE - margin > b.x &&
    a.y < b.y + TILE_SIZE - margin &&
    a.y + TILE_SIZE - margin > b.y
  );
}

// ===== タイルクリック =====
function onTileClick(id) {
  if (gameOver || isAnimating) return;
  const tile = tiles.find(t => t.id === id);
  if (!tile || tile.blocked) return;

  if (slots.length >= BASE_SLOTS) return;

  // タップ音
  SFX.tap();

  // アンドゥ用スナップショット
  saveHistory();

  // 飛翔先スロットインデックスを計算（ソート後の最終位置）
  const newType = tile.type;
  if (!slotTypeOrder.includes(newType)) slotTypeOrder.push(newType);
  const tempSlots = [...slots, newType];
  tempSlots.sort((a, b) => slotTypeOrder.indexOf(a) - slotTypeOrder.indexOf(b));
  const targetSlotIndex = tempSlots.lastIndexOf(newType);

  // タイルとスロットのscreen座標を計算
  const gameArea = document.getElementById('game-area');
  const gameRect = gameArea.getBoundingClientRect();
  const availW = Math.min(560, window.innerWidth - 32);
  const scale = availW / 560;
  const tileScreenX = gameRect.left + tile.x * scale;
  const tileScreenY = gameRect.top + tile.y * scale;
  const tileScreenSize = TILE_SIZE * scale;

  const slotAreaElem = document.getElementById('slot-area');
  const slotRect = slotAreaElem.getBoundingClientRect();
  const slotSize = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--slot-size'), 10) || 58;
  const targetX = slotRect.left + 16 + targetSlotIndex * (slotSize + 6);
  const targetY = slotRect.top + (slotRect.height - slotSize) / 2;
  const dx = targetX - tileScreenX;
  const dy = targetY - tileScreenY;
  const targetScale = slotSize / tileScreenSize;

  // 飛翔専用フルスクリーンレイヤー（position:fixed+absolute内包でiOS視覚座標を確実に一致させる）
  const flyLayer = document.createElement('div');
  flyLayer.style.cssText = 'position:fixed;left:0;top:0;width:100%;height:100%;pointer-events:none;z-index:99999;';
  document.body.appendChild(flyLayer);

  const clone = tile.elem.cloneNode(true);
  clone.style.position = 'absolute';
  clone.style.left = tileScreenX + 'px';
  clone.style.top = tileScreenY + 'px';
  clone.style.width = tileScreenSize + 'px';
  clone.style.height = tileScreenSize + 'px';
  clone.style.fontSize = (tileScreenSize * 0.731) + 'px';
  clone.style.borderRadius = Math.round(14 * scale) + 'px';
  clone.style.transformOrigin = 'top left';
  flyLayer.appendChild(clone);

  // タイルをゲームエリアから除去
  tile.elem.remove();
  tiles = tiles.filter(t => t.id !== id);
  updateBlockedState();

  // slots を更新してアニメーション開始
  slots = tempSlots;
  isAnimating = true;

  // Web Animations API
  // delay:16 でiOS WebKitに初期フレームを1枚描画させてからアニメーション開始
  const anim = clone.animate([
    { transform: 'translate(0, 0) scale(1)',                                     opacity: '1'   },
    { transform: `translate(${dx}px, ${dy}px) scale(${targetScale})`,           opacity: '0.7' }
  ], {
    duration: 220,
    delay: 16,
    easing: 'cubic-bezier(0.4, 0, 0.8, 0.6)',
    fill: 'both'
  });

  // iOS WebKitではonfinishが発火しない場合があるためsetTimeoutでフォールバック
  let done = false;
  const onDone = () => {
    if (done) return;
    done = true;
    flyLayer.remove();
    _afterFlyComplete();
  };
  anim.addEventListener('finish', onDone);
  setTimeout(onDone, 300);
}

// ===== マッチチェック =====
function checkMatch() {
  TILE_TYPES.forEach((_, type) => {
    const count = slots.filter(s => s === type).length;
    if (count >= 3) {
      // 3つ消す
      let removed = 0;
      slots = slots.filter(s => {
        if (s === type && removed < 3) { removed++; return false; }
        return true;
      });
    }
  });
}

// ===== タイル飛翔後処理 =====
function _afterFlyComplete() {
  // マッチしたタイプを検出
  let matchedType = -1;
  TILE_TYPES.forEach((_, type) => {
    if (slots.filter(s => s === type).length >= 3) matchedType = type;
  });

  if (matchedType === -1) {
    renderSlots();
    updateTileCount();
    checkGameState();
    isAnimating = false;
    return;
  }

  // マッチあり：スロットを描画してから消去アニメーション
  SFX.match();
  renderSlots();
  const slotAreaElem = document.getElementById('slot-area');
  const allSlotDivs = slotAreaElem.querySelectorAll('.slot');
  let matchCount = 0;
  slots.forEach((s, i) => {
    if (s === matchedType && matchCount < 3) {
      allSlotDivs[i].classList.add('match-exit');
      matchCount++;
    }
  });

  setTimeout(() => {
    checkMatch();
    renderSlots();
    updateTileCount();
    checkGameState();
    isAnimating = false;
  }, 400);
}

// ===== スロット描画 =====
function renderSlots() {
  const area = document.getElementById('slot-area');
  area.innerHTML = '';

  for (let i = 0; i < BASE_SLOTS; i++) {
    const div = document.createElement('div');
    div.className = 'slot';
    if (slots[i] !== undefined) {
      div.classList.add('filled');
      div.style.background = getTileColor(slots[i]);
      div.style.border = '2px solid rgba(255,255,255,0.4)';
      div.textContent = TILE_TYPES[slots[i]];
    }
    area.appendChild(div);
  }
}

function getTileColor(type) {
  const colors = ['#ffe066','#b8b8b8','#b3e8cc','#f5dfa0','#f5b0a0','#a0c4f5','#f5caa0','#f5e890','#c0c0c0','#c8b0f0','#ffd700','#e8603c','#f0e080','#60d0c0','#d8c0ff'];
  return colors[type] || '#f5f5f5';
}

// ===== タイル残数更新 =====
function updateTileCount() {
  document.getElementById('tile-count').textContent = tiles.length;
}

// ===== ゲーム状態チェック =====
function checkGameState() {
  if (tiles.length === 0) {
    SFX.bgmStop(0.4);
    SFX.clear();
    showClearOverlay();
    gameOver = true;
    return;
  }
  if (slots.length >= BASE_SLOTS) {
    SFX.bgmStop(0.3);
    SFX.gameover();
    const removed = totalTiles - tiles.length - slots.length;
    const pct = Math.floor(removed / totalTiles * 100);
    showOverlay('💀 ゲームオーバー', `${pct}% クリア！
あと一歩でした…`);
    gameOver = true;
  }
}

// ===== スキル =====
function updateShuffleBtn() {
  const btn = document.getElementById('skill-shuffle');
  document.getElementById('shuffle-count').textContent = shuffleRemain;
  btn.disabled = shuffleRemain <= 0;
}

document.getElementById('skill-shuffle').addEventListener('click', () => {
  if (gameOver || isAnimating || shuffleRemain <= 0) return;
  saveHistory();
  shuffleTilePositions();
  updateBlockedState();
  shuffleRemain--;
  updateShuffleBtn();
});

document.getElementById('skill-undo').addEventListener('click', () => {
  if (gameOver || isAnimating || history.length === 0 || undoRemain <= 0) return;
  restoreHistory();
  undoRemain--;
  updateUndoBtn();
});

function updateUndoBtn() {
  const btn = document.getElementById('skill-undo');
  document.getElementById('undo-count').textContent = undoRemain;
  btn.disabled = undoRemain <= 0;
}


function shuffleTilePositions() {
  // 位置はそのまま、タイルの種類だけをシャッフルする
  const types = tiles.map(t => t.type);
  shuffle(types);
  tiles.forEach((tile, i) => {
    tile.type = types[i];
    tile.elem.textContent = TILE_TYPES[types[i]];
    tile.elem.className = `tile tile-${types[i]}`;
  });
}

// ===== アンドゥ =====
function saveHistory() {
  history.push({
    tiles: tiles.map(t => ({ ...t })),
    slots: [...slots],
    slotTypeOrder: [...slotTypeOrder]
  });
  // undoボタンの有効/無効はundoRemainで管理するため更新のみ
  updateUndoBtn();
}

function restoreHistory() {
  if (history.length === 0) return;
  const snap = history.pop();

  // 現在のタイルDOM削除
  tiles.forEach(t => t.elem.remove());

  const gameArea = document.getElementById('game-area');

  tiles = snap.tiles.map(st => {
    // DOM再生成
    const elem = document.createElement('div');
    elem.className = `tile tile-${st.type}`;
    elem.style.left = st.x + 'px';
    elem.style.top  = st.y + 'px';
    elem.style.zIndex = st.zIndex;
    elem.textContent = TILE_TYPES[st.type];
    elem.dataset.id = st.id;
    const tile = { ...st, elem };
    elem.addEventListener('click', () => onTileClick(tile.id));
    gameArea.appendChild(elem);
    return tile;
  });

  slots = snap.slots;
  slotTypeOrder = snap.slotTypeOrder || [];

  updateBlockedState();
  renderSlots();
  updateTileCount();

  if (undoRemain <= 0) {
    document.getElementById('skill-undo').disabled = true;
  }
}

// ===== ユーティリティ =====
function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = randInt(0, i);
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ===== レスポンシブ対応 =====
function resizeGame() {
  const availW = Math.min(560, window.innerWidth - 32);
  const scale = availW / 560;

  const wrapper = document.getElementById('game-wrapper');
  const gameArea = document.getElementById('game-area');
  if (wrapper && gameArea) {
    gameArea.style.transform = `scale(${scale})`;
    wrapper.style.height = (700 * scale) + 'px';
  }

  // スロットサイズをビューポート幅に応じて動的調整
  const innerW = availW - 32; // padding 16px × 2
  const gapTotal = (BASE_SLOTS - 1) * 6;
  const slotSize = Math.max(32, Math.min(58, Math.floor((innerW - gapTotal) / BASE_SLOTS)));
  document.documentElement.style.setProperty('--slot-size', slotSize + 'px');
}

window.addEventListener('resize', resizeGame);
window.addEventListener('orientationchange', () => setTimeout(resizeGame, 150));

function spawnSpaceship() {
  if (!document.getElementById('game-screen').classList.contains('visible')) return;

  const rnd   = Math.random();
  const isXW  = rnd < 0.34;
  const isFAL = rnd > 0.66;
  const goRTL = Math.random() < 0.5;
  const sign  = Math.random() < 0.5 ? 1 : -1;

  let ang, svgW, svgH, dur;
  if (isXW) {
    ang  = sign * (20 + Math.round(Math.random() * 25));   // ±20〜±45
    svgW = 58 + Math.round(Math.random() * 32);            // 58〜90px
    svgH = Math.round(svgW * 38 / 95);
    dur  = 7000 + Math.random() * 5000;
  } else if (isFAL) {
    ang  = sign * Math.round(Math.random() * 18);          // ±0〜±18（ほぼ水平）
    svgW = 115 + Math.round(Math.random() * 45);           // 115〜160px（最大）
    svgH = Math.round(svgW * 118 / 220);
    dur  = 6000 + Math.random() * 4000;
  } else {
    ang  = Math.round(Math.random() * 60 - 30);            // -30〜+30
    svgW = 36 + Math.round(Math.random() * 28);            // 36〜64px
    svgH = Math.round(svgW * 64 / 96);
    dur  = 7000 + Math.random() * 6000;
  }

  const vw   = window.innerWidth;
  const vh   = window.innerHeight;
  const dist = Math.sqrt(vw * vw + vh * vh) + 180;
  const rad  = ang * Math.PI / 180;
  const mx   = goRTL ? -dist : dist;
  const my   = dist * Math.sin(rad);

  const sx = goRTL ? vw + svgW : -svgW;
  const sy = vh * (0.04 + Math.random() * 0.68);
  const rot = goRTL ? 180 + ang : ang;

  const wrap = document.createElement('div');
  wrap.className = 'ship-wrap';
  wrap.innerHTML = isXW ? _xwingSVG(svgW) : (isFAL ? _falconSVG(svgW) : _tieSVG(svgW));
  document.body.insertBefore(wrap, document.body.firstChild);

  const kf = [
    { transform: `translate(${sx}px,${sy}px) rotate(${rot}deg)`,                         opacity: '0',    offset: 0    },
    { transform: `translate(${sx + mx*0.07}px,${sy + my*0.07}px) rotate(${rot}deg)`,     opacity: '0.65', offset: 0.07 },
    { transform: `translate(${sx + mx*0.93}px,${sy + my*0.93}px) rotate(${rot}deg)`,     opacity: '0.65', offset: 0.93 },
    { transform: `translate(${sx + mx}px,${sy + my}px) rotate(${rot}deg)`,               opacity: '0',    offset: 1    }
  ];
  const anim = wrap.animate(kf, { duration: dur, easing: 'linear', fill: 'forwards' });
  anim.addEventListener('finish', () => wrap.remove());
}
setInterval(spawnSpaceship, 4500);
