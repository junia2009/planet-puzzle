<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Planet Puzzle">
  <meta name="theme-color" content="#a78bfa">
  <link rel="manifest" href="manifest.json">
  <title>PLANET PUZZLE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a1a;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(99,51,153,0.25) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(20,80,160,0.25) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 10%, rgba(180,60,100,0.15) 0%, transparent 40%);
      color: #fff;
      font-family: 'Noto Sans JP', sans-serif;
      display: block;
      min-height: 100vh;
    }

    /* 星背景 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 45%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 25%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 75% 55%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 10%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 20% 80%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 70%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 35%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(2px 2px at 65% 90%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 5% 60%, rgba(255,255,255,0.5) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ========== タイトル画面 ========== */
    #title-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 5000;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    #title-screen.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(1.04);
    }

    /* 惑星アニメーション */
    .planet-orbit {
      position: relative;
      width: min(320px, 80vw);
      height: min(320px, 80vw);
      margin-bottom: 32px;
    }

    .planet-main {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: min(9rem, 22vw);
      animation: planet-float 4s ease-in-out infinite;
      filter: drop-shadow(0 0 40px rgba(167,139,250,0.8));
    }

    @keyframes planet-float {
      0%, 100% { transform: translateY(0px) rotate(-3deg); }
      50%       { transform: translateY(-18px) rotate(3deg); }
    }

    .orbit-ring {
      position: absolute;
      inset: 10%;
      border-radius: 50%;
      border: 1px solid rgba(167,139,250,0.2);
      animation: orbit-spin 8s linear infinite;
    }

    .orbit-ring::after {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      background: radial-gradient(circle, #60a5fa, #3b82f6);
      border-radius: 50%;
      top: -6px;
      left: calc(50% - 6px);
      box-shadow: 0 0 10px #60a5fa;
    }

    @keyframes orbit-spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .orbit-ring-2 {
      position: absolute;
      inset: 25%;
      border-radius: 50%;
      border: 1px solid rgba(244,114,182,0.2);
      animation: orbit-spin 5s linear infinite reverse;
    }

    .orbit-ring-2::after {
      content: '';
      position: absolute;
      width: 9px;
      height: 9px;
      background: radial-gradient(circle, #f472b6, #ec4899);
      border-radius: 50%;
      bottom: -4px;
      left: calc(50% - 4px);
      box-shadow: 0 0 8px #f472b6;
    }

    #title-logo {
      font-family: 'Orbitron', sans-serif;
      font-size: min(3rem, 10vw);
      font-weight: 900;
      letter-spacing: 6px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      margin-bottom: 8px;
      filter: drop-shadow(0 0 20px rgba(167,139,250,0.5));
    }

    #title-sub {
      font-size: 0.85rem;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      margin-bottom: 48px;
    }

    #start-btn {
      position: relative;
      padding: 18px 56px;
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 3px;
      color: #fff;
      background: transparent;
      border: 1.5px solid rgba(167,139,250,0.6);
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s;
      overflow: hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    #start-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(167,139,250,0.15), rgba(96,165,250,0.15));
      opacity: 0;
      transition: opacity 0.3s;
    }

    #start-btn:hover::before, #start-btn:active::before { opacity: 1; }

    #start-btn:hover {
      border-color: rgba(167,139,250,1);
      box-shadow: 0 0 30px rgba(167,139,250,0.5), inset 0 0 20px rgba(167,139,250,0.1);
      transform: translateY(-2px);
    }

    /* 流れ星 */
    .shooting-star {
      position: fixed;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      pointer-events: none;
      animation: shoot linear forwards;
    }

    @keyframes shoot {
      0%   { transform: translate(0, 0) scaleX(1); opacity: 1; }
      100% { transform: translate(200px, 200px) scaleX(40); opacity: 0; }
    }

    /* ゲーム画面 */
    #game-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      width: 100%;
      min-height: 100vh;
      padding: 20px 16px max(24px, env(safe-area-inset-bottom, 24px));
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.5s ease 0.3s, transform 0.5s ease 0.3s;
      pointer-events: none;
    }

    #game-screen.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: 4px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
      position: relative;
      z-index: 1;
    }

    #info-bar {
      display: flex;
      gap: 24px;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.45);
      margin-bottom: 14px;
      letter-spacing: 1px;
      position: relative;
      z-index: 1;
    }

    #info-bar span {
      color: #a78bfa;
      font-weight: 700;
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
    }

    /* ゲームエリアラッパ（レスポンシブ高さ調整） */
    #game-wrapper {
      position: relative;
      width: min(560px, calc(100vw - 32px));
      z-index: 1;
      margin-bottom: 16px;
    }

    /* ゲームエリア */
    #game-area {
      position: relative;
      width: 560px;
      height: 560px;
      background: rgba(255,255,255,0.03);
      border-radius: 20px;
      border: 1px solid rgba(167,139,250,0.25);
      overflow: hidden;
      box-shadow:
        0 0 40px rgba(99,51,153,0.3),
        inset 0 0 60px rgba(0,0,0,0.4);
      transform-origin: top left;
    }

    /* タイル */
    .tile {
      position: absolute;
      width: 60px;
      height: 60px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.9rem;
      cursor: pointer;
      user-select: none;
      border: 1.5px solid rgba(255,255,255,0.35);
      transition: transform 0.12s, box-shadow 0.12s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.4);
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .tile:hover:not(.blocked) {
      transform: scale(1.1) translateY(-2px);
      box-shadow: 0 6px 20px rgba(167,139,250,0.5), inset 0 1px 0 rgba(255,255,255,0.5);
      z-index: 9999 !important;
    }

    .tile.blocked {
      cursor: not-allowed;
      filter: brightness(0.45) saturate(0.5);
    }

    /* タイル種類ごとの背景色（淡いパステル統一） */
    .tile-0 { background: linear-gradient(145deg, #fff5f5, #fde8e8); }
    .tile-1 { background: linear-gradient(145deg, #fff8f0, #fdebd0); }
    .tile-2 { background: linear-gradient(145deg, #fffef0, #fef9e7); }
    .tile-3 { background: linear-gradient(145deg, #f0fdf6, #e8f8f0); }
    .tile-4 { background: linear-gradient(145deg, #f0fdfb, #e8f6f3); }
    .tile-5 { background: linear-gradient(145deg, #f0f8ff, #e8f4fc); }
    .tile-6 { background: linear-gradient(145deg, #faf0ff, #f3eaf9); }
    .tile-7 { background: linear-gradient(145deg, #fff0f8, #fde8f1); }
    .tile-8 { background: linear-gradient(145deg, #f0fdff, #e8f7fa); }
    .tile-9 { background: linear-gradient(145deg, #f5fff0, #f0f8e8); }

    /* スロットエリア */
    #slot-area {
      display: flex;
      gap: 6px;
      width: min(560px, calc(100vw - 32px));
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      border: 1px solid rgba(167,139,250,0.2);
      padding: 12px 16px;
      margin-bottom: 16px;
      min-height: 88px;
      align-items: center;
      overflow-x: auto;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
      position: relative;
      z-index: 1;
    }

    .slot {
      width: var(--slot-size, 58px);
      height: var(--slot-size, 58px);
      min-width: var(--slot-size, 58px);
      border-radius: 12px;
      border: 1.5px dashed rgba(255,255,255,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: calc(var(--slot-size, 58px) * 0.55);
      transition: all 0.2s;
      background: rgba(255,255,255,0.04);
    }

    .slot.extra {
      border-color: rgba(251,191,36,0.6);
      box-shadow: 0 0 12px rgba(251,191,36,0.3);
      background: rgba(251,191,36,0.06);
    }

    .slot.filled {
      border-style: solid;
      border-color: rgba(255,255,255,0.3);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.3);
    }

    /* スキルエリア */
    #skill-area {
      display: flex;
      gap: 16px;
      width: min(560px, calc(100vw - 32px));
      justify-content: center;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }

    .skill-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 12px 20px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(8px);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.2s;
      color: rgba(255,255,255,0.8);
      min-width: min(90px, calc((100vw - 96px) / 3));
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .skill-btn .skill-icon {
      font-size: 1.6rem;
      line-height: 1;
    }

    .skill-btn:disabled {
      opacity: 0.25;
      cursor: not-allowed;
    }

    #skill-shuffle { border-color: rgba(96,165,250,0.4); }
    #skill-shuffle:not(:disabled):hover {
      background: rgba(96,165,250,0.15);
      border-color: rgba(96,165,250,0.7);
      box-shadow: 0 0 16px rgba(96,165,250,0.3);
      transform: translateY(-2px);
    }

    #skill-undo { border-color: rgba(167,139,250,0.4); }
    #skill-undo:not(:disabled):hover {
      background: rgba(167,139,250,0.15);
      border-color: rgba(167,139,250,0.7);
      box-shadow: 0 0 16px rgba(167,139,250,0.3);
      transform: translateY(-2px);
    }

    #skill-expand { border-color: rgba(251,191,36,0.4); }
    #skill-expand:not(:disabled):hover {
      background: rgba(251,191,36,0.12);
      border-color: rgba(251,191,36,0.7);
      box-shadow: 0 0 16px rgba(251,191,36,0.3);
      transform: translateY(-2px);
    }

    /* オーバーレイ */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }

    #overlay.show { display: flex; }

    #overlay-box {
      background: rgba(15,10,40,0.95);
      border: 1px solid rgba(167,139,250,0.35);
      border-radius: 24px;
      padding: 48px 56px;
      text-align: center;
      box-shadow: 0 0 60px rgba(99,51,153,0.5), 0 0 120px rgba(99,51,153,0.2);
    }

    #overlay-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.2rem;
      font-weight: 900;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #overlay-msg {
      color: rgba(255,255,255,0.6);
      font-size: 1rem;
      margin-bottom: 8px;
    }

    #overlay-btn {
      margin-top: 24px;
      padding: 14px 40px;
      border-radius: 12px;
      border: 1px solid rgba(167,139,250,0.5);
      background: linear-gradient(135deg, rgba(167,139,250,0.2), rgba(96,165,250,0.2));
      color: #fff;
      font-size: 1rem;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.2s;
    }

    #overlay-btn:hover {
      background: linear-gradient(135deg, rgba(167,139,250,0.4), rgba(96,165,250,0.4));
      box-shadow: 0 0 20px rgba(167,139,250,0.4);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>

<div id="title-screen">
  <div class="planet-orbit">
    <div class="orbit-ring"></div>
    <div class="orbit-ring-2"></div>
    <div class="planet-main">🪐</div>
  </div>
  <div id="title-logo">PLANET<br>PUZZLE</div>
  <div id="title-sub">Match the planets · Clear the sky</div>
  <button id="start-btn">GAME START</button>
</div>

<div id="game-screen">
<h1>PLANET PUZZLE</h1>

<div id="info-bar">
  残りタイル &nbsp;<span id="tile-count">0</span>
</div>

<div id="game-wrapper">
  <div id="game-area"></div>
</div>

<div id="slot-area"></div>

<div id="skill-area">
  <button class="skill-btn" id="skill-shuffle">
    <span class="skill-icon">🔀</span>シャッフル
  </button>
  <button class="skill-btn" id="skill-undo">
    <span class="skill-icon">↩️</span>元に戻す
  </button>
  <button class="skill-btn" id="skill-expand">
    <span class="skill-icon">➕</span>スロット拡張
  </button>
</div>
</div>

<div id="overlay">
  <div id="overlay-box">
    <div id="overlay-title"></div>
    <div id="overlay-msg"></div>
    <button id="overlay-btn">もう一度</button>
  </div>
</div>

<script>
// ===== 定数 =====
// 惑星・天体テーマ（太陽系8惑星＋太陽＋月）
const TILE_TYPES = ['☀️','🌕','🌍','🪐','🔴','🔵','🟠','🟡','⚫','🟣'];
const TILE_COUNT_EACH = 27;  // 各タイル種類の枚数（3の倍数）→ 合計270枚
const GAME_W = 560, GAME_H = 560;
const TILE_SIZE = 60;
const BASE_SLOTS = 7;
const SLOT_EXPAND = 3;
const LAYERS = 9;             // 積み重ねレイヤー数
const CELL_SPACING = 50;      // セル間隔（タイル60px > 50px→隣接セルと少し重なる）
const GRID_COLS = 9;          // 配置グリッド列数
const GRID_ROWS = 9;          // 配置グリッド行数
const JITTER = 2;             // グリッド位置からのランダムずれ（px）

// ===== 状態 =====
let tiles = [];         // { id, type, x, y, layer, elem, blocked }
let slots = [];         // スロットに入ったタイル種類の配列
let extraSlots = 0;     // スロット拡張数
let history = [];       // アンドゥ用スタック [{tiles, slots}]
let gameOver = false;

// ===== 初期化 =====
function init() {
  tiles = [];
  slots = [];
  extraSlots = 0;
  history = [];
  gameOver = false;

  document.getElementById('game-area').innerHTML = '';
  document.getElementById('skill-shuffle').disabled = false;
  document.getElementById('skill-undo').disabled = true;
  document.getElementById('skill-expand').disabled = false;

  generateTiles();
  updateBlockedState();
  renderSlots();
  updateTileCount();
}

// ===== タイル生成 =====
function generateTiles() {
  const gameArea = document.getElementById('game-area');

  // タイルの種類プール（各TILE_COUNT_EACH枚）
  let pool = [];
  TILE_TYPES.forEach((t, i) => {
    for (let k = 0; k < TILE_COUNT_EACH; k++) pool.push({ type: i });
  });
  shuffle(pool);

  // セル間がタイルより狭いため隣接タイルが少し重なり、相互ブロックが発生する
  const gridW = GRID_COLS * CELL_SPACING;
  const gridH = GRID_ROWS * CELL_SPACING;
  const marginX = Math.floor((GAME_W - gridW) / 2);
  const marginY = Math.floor((GAME_H - gridH) / 2);
  const cellCount = GRID_COLS * GRID_ROWS;
  let id = 0;

  // セル座標配列を作ってシャッフルし、各タイルに割り当てる
  const cellAssignments = [];
  for (let i = 0; i < pool.length; i++) {
    cellAssignments.push(i % cellCount);
  }
  shuffle(cellAssignments);

  pool.forEach((p, idx) => {
    const layer = Math.floor(idx / (pool.length / LAYERS));
    const cellIdx = cellAssignments[idx];
    const col = cellIdx % GRID_COLS;
    const row = Math.floor(cellIdx / GRID_COLS);
    const baseX = marginX + col * CELL_SPACING;
    const baseY = marginY + row * CELL_SPACING;
    const x = Math.max(0, Math.min(GAME_W - TILE_SIZE, baseX + randInt(-JITTER, JITTER)));
    const y = Math.max(0, Math.min(GAME_H - TILE_SIZE, baseY + randInt(-JITTER, JITTER)));
    const zIndex = 10 + layer * 30 + randInt(0, 10);

    const elem = document.createElement('div');
    elem.className = `tile tile-${p.type}`;
    elem.style.left = x + 'px';
    elem.style.top  = y + 'px';
    elem.style.zIndex = zIndex;
    elem.textContent = TILE_TYPES[p.type];
    elem.dataset.id = id;

    const tile = { id, type: p.type, x, y, layer, zIndex, elem, blocked: false };
    tiles.push(tile);
    elem.addEventListener('click', () => onTileClick(tile.id));
    gameArea.appendChild(elem);
    id++;
  });
}

// ===== ブロック状態更新 =====
// あるタイルの上に（zIndexが大きく、座標が重なる）別のタイルがあればブロック
function updateBlockedState() {
  tiles.forEach(t => {
    t.blocked = tiles.some(other => {
      if (other.id === t.id) return false;
      if (other.zIndex <= t.zIndex) return false;
      return rectsOverlap(t, other);
    });
    t.elem.classList.toggle('blocked', t.blocked);
  });
}

function rectsOverlap(a, b) {
  const margin = 3; // 隣接セル（50px間隔）の5px重なりも検出
  return (
    a.x < b.x + TILE_SIZE - margin &&
    a.x + TILE_SIZE - margin > b.x &&
    a.y < b.y + TILE_SIZE - margin &&
    a.y + TILE_SIZE - margin > b.y
  );
}

// ===== タイルクリック =====
function onTileClick(id) {
  if (gameOver) return;
  const tile = tiles.find(t => t.id === id);
  if (!tile || tile.blocked) return;

  const totalSlots = BASE_SLOTS + extraSlots;
  if (slots.length >= totalSlots) return;

  // アンドゥ用スナップショット
  saveHistory();

  // スロットに追加
  slots.push(tile.type);

  // タイルをゲームエリアから除去
  tile.elem.remove();
  tiles = tiles.filter(t => t.id !== id);

  updateBlockedState();

  // 同じ種類が3つ揃ったか確認
  checkMatch();

  renderSlots();
  updateTileCount();
  checkGameState();
}

// ===== マッチチェック =====
function checkMatch() {
  TILE_TYPES.forEach((_, type) => {
    const count = slots.filter(s => s === type).length;
    if (count >= 3) {
      // 3つ消す
      let removed = 0;
      slots = slots.filter(s => {
        if (s === type && removed < 3) { removed++; return false; }
        return true;
      });
    }
  });
}

// ===== スロット描画 =====
function renderSlots() {
  const area = document.getElementById('slot-area');
  area.innerHTML = '';
  const totalSlots = BASE_SLOTS + extraSlots;

  for (let i = 0; i < totalSlots; i++) {
    const div = document.createElement('div');
    div.className = 'slot';
    if (i >= BASE_SLOTS) div.classList.add('extra');
    if (slots[i] !== undefined) {
      div.classList.add('filled');
      div.style.background = getTileColor(slots[i]);
      div.style.border = '2px solid rgba(255,255,255,0.4)';
      div.textContent = TILE_TYPES[slots[i]];
    }
    area.appendChild(div);
  }
}

function getTileColor(type) {
  const colors = ['#fde8e8','#fdebd0','#fef9e7','#e8f8f0','#e8f6f3','#e8f4fc','#f3eaf9','#fde8f1','#e8f7fa','#f0f8e8'];
  return colors[type] || '#f5f5f5';
}

// ===== タイル残数更新 =====
function updateTileCount() {
  document.getElementById('tile-count').textContent = tiles.length;
}

// ===== ゲーム状態チェック =====
function checkGameState() {
  if (tiles.length === 0) {
    showOverlay('🎉 クリア！', 'すべてのタイルを消しました！');
    gameOver = true;
    return;
  }
  const totalSlots = BASE_SLOTS + extraSlots;
  if (slots.length >= totalSlots) {
    showOverlay('💀 ゲームオーバー', 'スロットがいっぱいになりました。');
    gameOver = true;
  }
}

// ===== スキル =====
document.getElementById('skill-shuffle').addEventListener('click', () => {
  if (gameOver) return;
  saveHistory();
  shuffleTilePositions();
  updateBlockedState();
});

document.getElementById('skill-undo').addEventListener('click', () => {
  if (gameOver || history.length === 0) return;
  restoreHistory();
});

document.getElementById('skill-expand').addEventListener('click', () => {
  if (gameOver) return;
  extraSlots += SLOT_EXPAND;
  document.getElementById('skill-expand').disabled = true;
  resizeGame();
  renderSlots();
});

function shuffleTilePositions() {
  const gameArea = document.getElementById('game-area');
  tiles.forEach(tile => {
    const x = randInt(0, GAME_W - TILE_SIZE);
    const y = randInt(0, GAME_H - TILE_SIZE);
    tile.x = x;
    tile.y = y;
    tile.elem.style.left = x + 'px';
    tile.elem.style.top  = y + 'px';
  });
}

// ===== アンドゥ =====
function saveHistory() {
  history.push({
    tiles: tiles.map(t => ({ ...t })),
    slots: [...slots],
    extraSlots
  });
  document.getElementById('skill-undo').disabled = false;
}

function restoreHistory() {
  if (history.length === 0) return;
  const snap = history.pop();

  // 現在のタイルDOM削除
  tiles.forEach(t => t.elem.remove());

  const gameArea = document.getElementById('game-area');

  tiles = snap.tiles.map(st => {
    // DOM再生成
    const elem = document.createElement('div');
    elem.className = `tile tile-${st.type}`;
    elem.style.left = st.x + 'px';
    elem.style.top  = st.y + 'px';
    elem.style.zIndex = st.zIndex;
    elem.textContent = TILE_TYPES[st.type];
    elem.dataset.id = st.id;
    const tile = { ...st, elem };
    elem.addEventListener('click', () => onTileClick(tile.id));
    gameArea.appendChild(elem);
    return tile;
  });

  slots = snap.slots;
  extraSlots = snap.extraSlots;

  updateBlockedState();
  renderSlots();
  updateTileCount();

  if (history.length === 0) {
    document.getElementById('skill-undo').disabled = true;
  }
}

// ===== オーバーレイ =====
function showOverlay(title, msg) {
  document.getElementById('overlay-title').textContent = title;
  document.getElementById('overlay-msg').textContent = msg;
  document.getElementById('overlay').classList.add('show');
}

document.getElementById('overlay-btn').addEventListener('click', () => {
  document.getElementById('overlay').classList.remove('show');
  init();
});

// ===== ユーティリティ =====
function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = randInt(0, i);
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ===== レスポンシブ対応 =====
function resizeGame() {
  const availW = Math.min(560, window.innerWidth - 32);
  const scale = availW / 560;

  const wrapper = document.getElementById('game-wrapper');
  const gameArea = document.getElementById('game-area');
  if (wrapper && gameArea) {
    gameArea.style.transform = `scale(${scale})`;
    wrapper.style.height = (560 * scale) + 'px';
  }

  // スロットサイズをビューポート幅に応じて動的調整
  const totalSlots = BASE_SLOTS + extraSlots;
  const innerW = availW - 32; // padding 16px × 2
  const gapTotal = (totalSlots - 1) * 6;
  const slotSize = Math.max(32, Math.min(58, Math.floor((innerW - gapTotal) / totalSlots)));
  document.documentElement.style.setProperty('--slot-size', slotSize + 'px');
}

window.addEventListener('resize', resizeGame);
window.addEventListener('orientationchange', () => setTimeout(resizeGame, 150));

// ===== PWA: apple-touch-icon を2D Canvasで動的生成 =====
(function () {
  try {
    const c = document.createElement('canvas');
    c.width = c.height = 180;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, 180, 180);
    const g = ctx.createRadialGradient(90, 90, 0, 90, 90, 90);
    g.addColorStop(0, 'rgba(167,139,250,0.5)');
    g.addColorStop(1, 'rgba(0,0,30,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, 180, 180);
    ctx.font = '90px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🪐', 90, 95);
    const link = document.createElement('link');
    link.rel = 'apple-touch-icon';
    link.href = c.toDataURL('image/png');
    document.head.appendChild(link);
  } catch (e) {}
})();

// ===== Service Worker 登録 =====
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

// ===== スタート =====
resizeGame();

// タイトル画面制御
document.getElementById('start-btn').addEventListener('click', () => {
  const titleScreen = document.getElementById('title-screen');
  const gameScreen  = document.getElementById('game-screen');

  titleScreen.classList.add('hidden');
  setTimeout(() => { titleScreen.style.display = 'none'; }, 650);

  gameScreen.classList.add('visible');
  init();
});

// 流れ星を定期生成
function spawnShootingStar() {
  const star = document.createElement('div');
  star.className = 'shooting-star';
  star.style.top  = Math.random() * 60 + 'vh';
  star.style.left = Math.random() * 80 + 'vw';
  star.style.animationDuration = (0.6 + Math.random() * 0.8) + 's';
  document.body.appendChild(star);
  star.addEventListener('animationend', () => star.remove());
}
setInterval(spawnShootingStar, 2200);
</script>
